[pytest]
# Pytest configuration for GuideAI test suite
# Behaviors: behavior_align_storage_layers, behavior_instrument_metrics_pipeline

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Output formatting
addopts =
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Verbose output for failures
    --tb=short
    # Show local variables in tracebacks
    --showlocals
    # Disable warnings capture to see all warnings
    -p no:warnings
    # Default timeout for all tests (prevents hung tests)
    --timeout=60
    # Timeout method (thread-based for better compatibility)
    --timeout-method=thread

# Parallel execution safety
# Default to serial execution; override with -n flag when safe
# Maximum recommended: -n 2 for local dev with Podman containers
# Usage: pytest -n 2 tests/

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that require external services
    postgres: marks tests that require PostgreSQL
    redis: marks tests that require Redis
    kafka: marks tests that require Kafka
    unit: marks pure unit tests with no external dependencies
    parity: marks tests validating cross-surface consistency
    load: marks load/performance tests
    production: marks tests requiring production-level resources (long duration, high volume)
    manual: marks tests requiring manual user interaction (device flow approval, etc.)
    smoke: marks smoke tests for staging environment validation

# Logging configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (when using pytest-cov)
# Run with: pytest --cov=guideai --cov-report=html
# [coverage:run]
# omit = tests/*,*/__pycache__/*

# Timeout warning
# Tests exceeding 30s will emit a warning before the 60s hard timeout
timeout_func_only = false

# xdist configuration (parallel execution)
# Distribute tests by file to minimize database contention
# --dist=loadfile groups tests from same file on same worker
# This reduces database connection churn
