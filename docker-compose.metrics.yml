version: '3.9'

# TimescaleDB infrastructure for guideAI MetricsService
# Purpose: Time-series storage for PRD success metrics (70% behavior reuse, 30% token savings, 80% completion, 95% compliance)
# Port: 5439 (avoids conflicts with other PostgreSQL containers)

services:
  # TimescaleDB - Metrics Service Database
  timescaledb-metrics:
    image: timescale/timescaledb:latest-pg16
    hostname: timescaledb-metrics
    container_name: guideai-timescaledb-metrics
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: guideai_metrics
      POSTGRES_USER: guideai_metrics_user
      POSTGRES_PASSWORD: local_metrics_dev_pw
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      # TimescaleDB configuration
      TIMESCALEDB_TELEMETRY: "off"
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=timescaledb"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_line_prefix=%m [%p] %q%u@%d "
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      # TimescaleDB-specific tuning
      - "-c"
      - "timescaledb.max_background_workers=8"
      - "-c"
      - "timescaledb.telemetry_level=off"
    volumes:
      - timescaledb-metrics-data:/var/lib/postgresql/data
      - ./schema/migrations/012_create_metrics_service.sql:/docker-entrypoint-initdb.d/012_create_metrics_service.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_metrics_user -d guideai_metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - guideai-metrics-net
    restart: unless-stopped

volumes:
  timescaledb-metrics-data:
    name: guideai_timescaledb_metrics_data
    driver: local

networks:
  guideai-metrics-net:
    name: guideai_metrics_network
    driver: bridge

# Usage:
# Start container: podman-compose -f docker-compose.metrics.yml up -d
# View logs: podman-compose -f docker-compose.metrics.yml logs -f timescaledb-metrics
# Stop container: podman-compose -f docker-compose.metrics.yml down
# Connect: psql postgresql://guideai_metrics_user:local_metrics_dev_pw@localhost:5439/guideai_metrics
# Remove volumes: podman-compose -f docker-compose.metrics.yml down -v

# Environment variable for Python services:
# export GUIDEAI_METRICS_PG_DSN="postgresql://guideai_metrics_user:local_metrics_dev_pw@localhost:5439/guideai_metrics"
