name: Behavior Benchmarks

on:
  schedule:
    # Run nightly at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      sample_size:
        description: 'Number of queries to run'
        required: false
        default: '100'
      top_k:
        description: 'Number of results to retrieve per query'
        required: false
        default: '5'
      save_to_db:
        description: 'Save results to database'
        required: false
        default: 'true'
        type: boolean

env:
  PYTHON_VERSION: '3.11'

jobs:
  benchmark:
    name: Run Behavior Retrieval Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: guideai
          POSTGRES_PASSWORD: guideai_test
          POSTGRES_DB: guideai_behavior
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary sentence-transformers numpy
          pip install -e .

      - name: Run database migrations
        env:
          BEHAVIOR_PG_DSN: postgresql://guideai:guideai_test@localhost:5432/guideai_behavior
        run: |
          for migration in schema/migrations/*.sql; do
            echo "Running $migration..."
            psql "$BEHAVIOR_PG_DSN" -f "$migration" || true
          done

      - name: Seed test behaviors
        env:
          BEHAVIOR_PG_DSN: postgresql://guideai:guideai_test@localhost:5432/guideai_behavior
        run: |
          python scripts/seed_behaviors_from_agents_md.py || echo "Seeding skipped or failed"

      - name: Run benchmark
        id: benchmark
        env:
          BEHAVIOR_PG_DSN: postgresql://guideai:guideai_test@localhost:5432/guideai_behavior
          EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
        run: |
          SAMPLE_SIZE="${{ github.event.inputs.sample_size || '100' }}"
          TOP_K="${{ github.event.inputs.top_k || '5' }}"
          SAVE_FLAG=""
          if [[ "${{ github.event.inputs.save_to_db }}" == "true" ]] || [[ "${{ github.event_name }}" == "schedule" ]]; then
            SAVE_FLAG="--save-to-db"
          fi

          python scripts/benchmark_retrieval.py \
            --sample-size "$SAMPLE_SIZE" \
            --top-k "$TOP_K" \
            --output json \
            --out-file benchmark_results.json \
            $SAVE_FLAG

          # Extract key metrics for summary
          echo "avg_latency=$(jq -r '.avg_latency_ms' benchmark_results.json)" >> $GITHUB_OUTPUT
          echo "p95_latency=$(jq -r '.p95_latency_ms' benchmark_results.json)" >> $GITHUB_OUTPUT
          echo "accuracy_k5=$(jq -r '.accuracy_at_k.k5 // 0' benchmark_results.json)" >> $GITHUB_OUTPUT
          echo "corpus_size=$(jq -r '.corpus_size' benchmark_results.json)" >> $GITHUB_OUTPUT

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.run_number }}
          path: benchmark_results.json
          retention-days: 90

      - name: Create benchmark summary
        run: |
          echo "## 📊 Behavior Retrieval Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Corpus Size | ${{ steps.benchmark.outputs.corpus_size }} behaviors |" >> $GITHUB_STEP_SUMMARY
          echo "| Average Latency | ${{ steps.benchmark.outputs.avg_latency }} ms |" >> $GITHUB_STEP_SUMMARY
          echo "| P95 Latency | ${{ steps.benchmark.outputs.p95_latency }} ms |" >> $GITHUB_STEP_SUMMARY
          echo "| Accuracy@5 | ${{ steps.benchmark.outputs.accuracy_k5 }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full results in artifact: \`benchmark-results-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Check performance thresholds
        run: |
          # Fail if P95 latency exceeds 100ms or accuracy drops below 70%
          P95="${{ steps.benchmark.outputs.p95_latency }}"
          ACCURACY="${{ steps.benchmark.outputs.accuracy_k5 }}"

          if (( $(echo "$P95 > 100" | bc -l) )); then
            echo "::error::P95 latency ($P95 ms) exceeds threshold of 100ms"
            exit 1
          fi

          if (( $(echo "$ACCURACY < 0.7" | bc -l) )); then
            echo "::warning::Accuracy@5 ($ACCURACY) is below 70% threshold"
          fi

          echo "✅ Performance thresholds passed"

      - name: Run quality gates
        id: quality_gates
        env:
          BEHAVIOR_PG_DSN: postgresql://guideai:guideai_test@localhost:5432/guideai_behavior
        run: |
          # Download previous results if available
          PREV_FLAG=""
          if [ -f data/benchmarks/previous_results.json ]; then
            PREV_FLAG="--previous data/benchmarks/previous_results.json"
          fi

          python scripts/run_quality_gates.py \
            --anchors packages/midnighter/benchmarks/regression_anchors.json \
            --output quality_gate_results.json \
            $PREV_FLAG || GATE_EXIT=$?

          # Extract summary for step output
          if [ -f quality_gate_results.json ]; then
            PASSED=$(jq -r '.passed_gates // 0' quality_gate_results.json)
            TOTAL=$(jq -r '.total_gates // 0' quality_gate_results.json)
            OVERALL=$(jq -r '.overall_passed // false' quality_gate_results.json)
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "overall=$OVERALL" >> $GITHUB_OUTPUT
          fi

          # Save current results as baseline for next run
          mkdir -p data/benchmarks
          cp quality_gate_results.json data/benchmarks/previous_results.json 2>/dev/null || true

          exit ${GATE_EXIT:-0}

      - name: Upload quality gate results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-gate-results-${{ github.run_number }}
          path: quality_gate_results.json
          retention-days: 90

      - name: Quality gate summary
        if: always()
        run: |
          echo "## 🚦 Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.quality_gates.outputs.overall }}" = "true" ]; then
            echo "✅ **All gates passed** (${{ steps.quality_gates.outputs.passed }}/${{ steps.quality_gates.outputs.total }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Gate failures** (${{ steps.quality_gates.outputs.passed }}/${{ steps.quality_gates.outputs.total }} passed)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Failure details</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            jq '.gates[] | select(.passed == false)' quality_gate_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No details available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: benchmark
    if: failure() && github.event_name == 'schedule'
    steps:
      - name: Send failure notification
        run: |
          echo "::warning::Nightly benchmark failed. Check workflow run for details."
          # Add Slack/email notification here if configured
