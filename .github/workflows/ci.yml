name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      publish_vscode:
        description: 'Publish to VSCode Marketplace'
        required: false
        default: false
        type: boolean
      publish_cursor:
        description: 'Publish to Cursor Extension Store'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION_DEFAULT: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # Security & Pre-Commit Checks
  # ============================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install GuideAI package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install pre-commit
        run: |
          pip install pre-commit
          ./scripts/install_hooks.sh
          pre-commit --version

      - name: Run gitleaks secret scan
        id: gitleaks
        run: |
          mkdir -p security/scan_reports
          if ./scripts/scan_secrets.sh; then
            echo "scan_status=passed" >> $GITHUB_OUTPUT
          else
            echo "scan_status=failed" >> $GITHUB_OUTPUT
            # Always fail the step if secrets are found
            exit 1
          fi

      - name: Check merge blocking policy
        if: failure() && steps.gitleaks.outputs.scan_status == 'failed'
        run: |
          # Configurable merge blocking for secret scan failures
          # Set GUIDEAI_SECURITY_BLOCK_ON_SECRETS=true in repository variables to enforce
          if [ "${{ vars.GUIDEAI_SECURITY_BLOCK_ON_SECRETS }}" = "true" ]; then
            echo "::error::Secret scan failed and GUIDEAI_SECURITY_BLOCK_ON_SECRETS is enabled."
            echo "::error::Merge is blocked until all secrets are removed or allowlisted in .gitleaks.toml"
            echo ""
            echo "To remediate:"
            echo "  1. Review the scan report in the artifacts"
            echo "  2. Remove real secrets and rotate credentials (behavior_rotate_leaked_credentials)"
            echo "  3. For false positives, add suppressions to .gitleaks.toml"
            echo "  4. Re-run the workflow"
            exit 1
          else
            echo "::warning::Secret scan found potential secrets but GUIDEAI_SECURITY_BLOCK_ON_SECRETS is not enabled."
            echo "Consider enabling merge blocking for enhanced security."
          fi

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: security/scan_reports/
          retention-days: 30

  pre-commit:
    name: Pre-Commit Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit checks
        run: pre-commit run --all-files --show-diff-on-failure

  # ============================================================================
  # Wheel packaging: MCP manifests + install smoke test
  # ============================================================================
  packaging-smoke:
    name: Wheel packaging and MCP manifests
    runs-on: ubuntu-latest
    needs: [pre-commit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Verify MCP manifest sync
        run: python scripts/verify_mcp_manifests_sync.py

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Assert tool JSON embedded in wheel
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          COUNT=$(unzip -l "$WHEEL" | grep -c 'guideai/mcp_tool_manifests/.*\.json$' || true)
          if [ "$COUNT" -lt 200 ]; then
            echo "Expected >=200 MCP JSON files in wheel, found $COUNT"
            exit 1
          fi
          echo "Wheel contains $COUNT MCP tool manifest files"

      - name: Install wheel in clean venv and run MCP doctor
        run: |
          python -m venv /tmp/guideai-wheel-venv
          /tmp/guideai-wheel-venv/bin/pip install dist/*.whl
          /tmp/guideai-wheel-venv/bin/guideai mcp-server doctor

  # ============================================================================
  # Python Test Matrix (3.10, 3.11, 3.12) with Service Containers
  # ============================================================================
  test-python:
    name: Python Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: [security-scan, packaging-smoke]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    # Service containers mirroring production setup
    services:
      postgres-behavior:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: guideai_behavior
          POSTGRES_PASSWORD: behavior_test_pass
          POSTGRES_DB: guideai_behavior
        ports:
          - 6433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      postgres-workflow:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: guideai_workflow
          POSTGRES_PASSWORD: workflow_test_pass
          POSTGRES_DB: guideai_workflow
        ports:
          - 6434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      postgres-action:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: guideai_action
          POSTGRES_PASSWORD: action_test_pass
          POSTGRES_DB: guideai_action
        ports:
          - 6435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      postgres-run:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: guideai_run
          POSTGRES_PASSWORD: run_test_pass
          POSTGRES_DB: guideai_run
        ports:
          - 6436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      postgres-compliance:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: guideai_compliance
          POSTGRES_PASSWORD: compliance_test_pass
          POSTGRES_DB: guideai_compliance
        ports:
          - 6437:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      postgres-telemetry:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: guideai_telemetry
          POSTGRES_PASSWORD: telemetry_test_pass
          POSTGRES_DB: guideai_telemetry
        ports:
          - 6438:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      redis:
        image: redis:7-alpine
        ports:
          - 6479:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
          --memory 128m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev  # For keychain support

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres,telemetry,semantic]"

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL services..."
          for port in 6433 6434 6435 6436 6437 6438; do
            timeout 30 bash -c "until pg_isready -h localhost -p $port; do sleep 1; done" || exit 1
          done
          echo "Waiting for Redis..."
          timeout 30 bash -c "until redis-cli -h localhost -p 6479 ping; do sleep 1; done" || exit 1
          echo "All services ready!"

      - name: Run database migrations
        run: |
          python scripts/run_migrations.py || true

      - name: Run pytest with coverage (parallel)
        env:
          GUIDEAI_PG_HOST_BEHAVIOR: localhost
          GUIDEAI_PG_PORT_BEHAVIOR: 6433
          GUIDEAI_PG_USER_BEHAVIOR: guideai_behavior
          GUIDEAI_PG_PASS_BEHAVIOR: behavior_test_pass
          GUIDEAI_PG_DB_BEHAVIOR: guideai_behavior
          GUIDEAI_PG_HOST_WORKFLOW: localhost
          GUIDEAI_PG_PORT_WORKFLOW: 6434
          GUIDEAI_PG_USER_WORKFLOW: guideai_workflow
          GUIDEAI_PG_PASS_WORKFLOW: workflow_test_pass
          GUIDEAI_PG_DB_WORKFLOW: guideai_workflow
          GUIDEAI_PG_HOST_ACTION: localhost
          GUIDEAI_PG_PORT_ACTION: 6435
          GUIDEAI_PG_USER_ACTION: guideai_action
          GUIDEAI_PG_PASS_ACTION: action_test_pass
          GUIDEAI_PG_DB_ACTION: guideai_action
          GUIDEAI_PG_HOST_RUN: localhost
          GUIDEAI_PG_PORT_RUN: 6436
          GUIDEAI_PG_USER_RUN: guideai_run
          GUIDEAI_PG_PASS_RUN: run_test_pass
          GUIDEAI_PG_DB_RUN: guideai_run
          GUIDEAI_PG_HOST_COMPLIANCE: localhost
          GUIDEAI_PG_PORT_COMPLIANCE: 6437
          GUIDEAI_PG_USER_COMPLIANCE: guideai_compliance
          GUIDEAI_PG_PASS_COMPLIANCE: compliance_test_pass
          GUIDEAI_PG_DB_COMPLIANCE: guideai_compliance
          GUIDEAI_PG_HOST_TELEMETRY: localhost
          GUIDEAI_PG_PORT_TELEMETRY: 6438
          GUIDEAI_PG_USER_TELEMETRY: guideai_telemetry
          GUIDEAI_PG_PASS_TELEMETRY: telemetry_test_pass
          GUIDEAI_PG_DB_TELEMETRY: guideai_telemetry
          REDIS_HOST: localhost
          REDIS_PORT: 6479
        run: |
          pytest -n auto \
            --cov=guideai \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=30 \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate test report
        if: always()
        run: |
          pytest \
            --ignore=test_kafka_consume.py \
            --tb=short \
            --junit-xml=test-results-py${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results-py${{ matrix.python-version }}.xml
          retention-days: 30

  # ============================================================================
  # Service Parity Tests (Critical)
  # ============================================================================
  test-parity:
    name: Service Parity Tests
    runs-on: ubuntu-latest
    needs: [security-scan]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,semantic]"

      - name: Run all parity tests
        run: |
          pytest tests/test_*_parity.py -v --tb=short

      - name: Run cross-surface consistency tests
        run: |
          pytest tests/test_cross_surface_consistency.py -v --tb=short

      - name: Run MCP device flow tests
        run: |
          pytest tests/test_mcp_device_flow.py -v --tb=short

      - name: Generate parity coverage matrix
        if: always()
        run: |
          python tests/test_all_service_parity.py > parity-coverage-report.txt || true

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-coverage-report
          path: parity-coverage-report.txt
          retention-days: 30

  # ============================================================================
  # MCP Server Validation
  # ============================================================================
  test-mcp-server:
    name: MCP Server Protocol Tests
    runs-on: ubuntu-latest
    needs: [security-scan]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run MCP server validation
        run: |
          python examples/test_mcp_server.py

      - name: Test MCP server startup
        run: |
          timeout 5 python -m guideai.mcp_server <<< '{"jsonrpc":"2.0","id":1,"method":"ping"}' || true

  # ============================================================================
  # Dashboard Build & Tests
  # ============================================================================
  test-dashboard:
    name: Dashboard Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web-console/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: web-console/dashboard
        run: npm ci

      - name: Run linter
        working-directory: web-console/dashboard
        run: npm run lint || true

      - name: Build dashboard
        working-directory: web-console/dashboard
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: web-console/dashboard/dist/
          retention-days: 7

  # ============================================================================
  # VS Code Extension Build
  # ============================================================================
  test-extension:
    name: VS Code Extension Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Compile extension
        working-directory: extension
        run: npm run compile

      - name: Package extension
        working-directory: extension
        run: |
          npm install -g @vscode/vsce
          vsce package --allow-missing-repository || true

      - name: Upload VSIX
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: extension/*.vsix
          retention-days: 7

  # ============================================================================
  # Integration Gate (All Tests Must Pass)
  # ============================================================================
  integration-gate:
    name: Integration Gate
    runs-on: ubuntu-latest
    needs:
      - security-scan
      - pre-commit
      - test-python
      - test-parity
      - test-mcp-server
      - test-dashboard
      - test-extension

    steps:
      - name: All checks passed
        run: |
          echo "✅ All CI checks passed successfully!"
          echo "✅ Security scan: PASSED"
          echo "✅ Pre-commit hooks: PASSED"
          echo "✅ Python tests (3.10, 3.11, 3.12): PASSED"
          echo "✅ Service parity tests: PASSED"
          echo "✅ MCP server validation: PASSED"
          echo "✅ Dashboard build: PASSED"
          echo "✅ VS Code extension: PASSED"
          echo ""
          echo "🎉 Ready for deployment!"

  # ============================================================================
  # Marketplace Publishing (Triggered manually for releases)
  # ============================================================================
  publish-marketplace:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: [integration-gate]
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.publish_vscode == 'true' || github.event.inputs.publish_cursor == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Install VSCE globally
        run: npm install -g @vscode/vsce

      - name: Publish to VSCode Marketplace
        if: github.event.inputs.publish_vscode == 'true'
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        working-directory: extension
        run: |
          echo "📦 Publishing GuideAI extension to VSCode Marketplace..."
          vsce publish --allow-missing-repository
          echo "✅ Successfully published to VSCode Marketplace!"

      - name: Publish to Cursor Extension Store
        if: github.event.inputs.publish_cursor == 'true'
        env:
          CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
        working-directory: extension
        run: |
          echo "📦 Publishing GuideAI extension to Cursor Store..."
          # TODO: Add Cursor extension publishing when available
          # vsce publish --target cursor --allow-missing-repository || true
          echo "✅ Cursor extension publishing ready!"

      - name: Create GitHub Release
        if: github.event.inputs.publish_vscode == 'true' || github.event.inputs.publish_cursor == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version || '1.0.0' }}
          release_name: Release ${{ github.event.inputs.version || '1.0.0' }}
          body: |
            GuideAI IDE Extension v${{ github.event.inputs.version || '1.0.0' }}

            🎉 New features:
            - Complete AI agent orchestration
            - Real-time execution tracking
            - Interactive compliance management
            - Enterprise-grade authentication

            📦 Available in:
            - VSCode Marketplace: https://marketplace.visualstudio.com/items?itemName=guideai.guideai-ide-extension
            - Cursor Extension Store: https://marketplace.cursor.sh/items/guideai.guideai-ide-extension

            🔗 Installation: `code --install-extension guideai.guideai-ide-extension`
          draft: false
          prerelease: false

  # ============================================================================
  # Deployment Jobs (Triggered on workflow_dispatch or main branch)
  # ============================================================================
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: [integration-gate]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            echo "DEPLOY_URL=https://api.guideai.com" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" == "staging" ]; then
            echo "DEPLOY_URL=https://staging.guideai.com" >> $GITHUB_ENV
          else
            echo "DEPLOY_URL=https://dev.guideai.com" >> $GITHUB_ENV
          fi

      - name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
        id: deploy
        run: |
          echo "🚀 Deploying to ${{ github.event.inputs.environment || 'dev' }}..."
          echo "url=${{ env.DEPLOY_URL }}" >> $GITHUB_OUTPUT
          # TODO: Add actual deployment steps here
          # - Build Podman images
          # - Push to container registry (Quay.io, GHCR, or private registry)
          # - Update Kubernetes/Podman pod deployment
          # - Run smoke tests
          echo "✅ Deployment complete!"

      - name: Record deployment action
        run: |
          echo "Recording deployment via guideai record-action..."
          # TODO: Wire to actual ActionService
          # guideai record-action \
          #   --artifact ".github/workflows/ci.yml" \
          #   --summary "Deployed to ${{ github.event.inputs.environment || 'dev' }}" \
          #   --behaviors behavior_orchestrate_cicd behavior_update_docs_after_changes

      - name: Notify deployment
        run: |
          echo "📢 Deployment notification would be sent here"
          # TODO: Add Slack/email notification
