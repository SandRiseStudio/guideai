name: Bug Report
description: Report a bug in GuideAI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Where did you encounter the bug?
      options:
        - CLI
        - REST API
        - MCP Server
        - Web Console
        - VS Code Extension
        - Desktop App
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `guideai ...`
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or screenshots if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: GuideAI version
      description: Output of `guideai --version` or commit hash
      placeholder: "0.1.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, related issues, or anything else that helps.
