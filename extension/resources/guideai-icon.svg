<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Robot head outline -->
  <rect x="4" y="6" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Antenna -->
  <line x1="12" y1="6" x2="12" y2="3" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="12" cy="2" r="1" fill="currentColor"/>
  <!-- Eyes -->
  <circle cx="8.5" cy="11" r="1.5" fill="currentColor"/>
  <circle cx="15.5" cy="11" r="1.5" fill="currentColor"/>
  <!-- Mouth/display -->
  <rect x="7" y="15" width="10" height="2" rx="0.5" fill="currentColor"/>
  <!-- Side elements (ears) -->
  <rect x="1" y="9" width="2" height="6" rx="0.5" fill="currentColor"/>
  <rect x="21" y="9" width="2" height="6" rx="0.5" fill="currentColor"/>
</svg>
