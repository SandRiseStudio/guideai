# Alembic Configuration File
# ===========================
# Behavior: behavior_migrate_postgres_schema
#
# This file configures Alembic for GuideAI database migrations.
# Database URL is loaded from environment/settings in env.py.

[alembic]
# Path to migration scripts (relative to this file)
script_location = migrations

# Template used for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone for revision timestamps (UTC recommended)
timezone = UTC

# Truncate the slug at this length
truncate_slug_length = 80

# Version path separator (default: space)
version_path_separator = os  # Use os.pathsep

# Set to 'true' to run "CREATE SCHEMA" on empty database
prepend_sys_path = .

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
