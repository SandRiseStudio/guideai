# Local Test Suite Blueprint - CONSOLIDATED DATABASE ARCHITECTURE
# Modular monolith with PostgreSQL schemas instead of separate databases
#
# Architecture (per docs/DATABASE_CONSOLIDATION_PLAN.md):
#   - guideai-db: Single PostgreSQL with schemas (auth, board, behavior, execution, workflow, consent, audit)
#   - telemetry-db: Separate TimescaleDB for hypertables (time-series data)
#
# Usage:
#   amprealize plan --blueprint local-test-suite --env development
#   amprealize apply --blueprint local-test-suite --env development
#
# Port Conventions (local development):
#   guideai-db: 5432 (main database with all schemas)
#   telemetry-db: 5433 (TimescaleDB for telemetry)
#   Redis: 6379
#   API: 8000
#   Web Console: 5173

name: local-test-suite
version: 2.0.0

# =============================================================================
# MODULES
# =============================================================================
modules:
  core:
    description: "Core data plane services (consolidated databases)"
    enabled: true
  console:
    description: "GuideAI API + web console (local dev)"
    enabled: true
  agents:
    description: "Agent workspace management (requires Podman API service)"
    enabled: true  # Required for queue-based execution (EXECUTION_MODE=queue)
  streaming:
    description: "Kafka streaming pipeline - optional"
    enabled: false
  monitoring:
    description: "Prometheus/Grafana monitoring - optional"
    enabled: false

# =============================================================================
# SERVICES
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # MODULE: CORE - Consolidated Data Stores
  # ---------------------------------------------------------------------------

  # --- Main Database (Port 5432) - All schemas ---
  # Contains: auth, board, behavior, execution, workflow, consent, audit schemas
  guideai-db:
    image: docker.io/timescale/timescaledb:latest-pg16
    module: core
    ports:
      - "${GUIDEAI_PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${GUIDEAI_PG_USER:-guideai}"
      POSTGRES_PASSWORD: "${GUIDEAI_PG_PASS:-guideai_dev}"
      POSTGRES_DB: "${GUIDEAI_PG_DB:-guideai}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - guideai-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai -d guideai"]
      interval: 5s
      timeout: 3s
      retries: 5
    healthcheck_timeout_s: 30

  # --- Telemetry Database (Port 5433) - TimescaleDB ---
  # Separate database for hypertables and time-series data
  telemetry-db:
    image: docker.io/timescale/timescaledb:latest-pg16
    module: core
    ports:
      - "${GUIDEAI_PG_PORT_TELEMETRY:-5433}:5432"
    environment:
      POSTGRES_USER: "${GUIDEAI_PG_USER_TELEMETRY:-telemetry}"
      POSTGRES_PASSWORD: "${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_dev}"
      POSTGRES_DB: "${GUIDEAI_PG_DB_TELEMETRY:-telemetry}"
    volumes:
      - telemetry-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetry"]
      interval: 5s
      timeout: 3s
      retries: 5
    healthcheck_timeout_s: 30

  # --- Redis Cache ---
  redis:
    image: docker.io/library/redis:7-alpine
    module: core
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    healthcheck_timeout_s: 15

  # ---------------------------------------------------------------------------
  # MODULE: AGENTS - Queue-Based Execution Workers
  # ---------------------------------------------------------------------------
  # Workers consume jobs from Redis Streams and provision workspaces on-demand
  # Podman socket is proxied via socat (podman-socket-proxy service)

  # --- Podman Socket Proxy (TCP gateway to Podman socket) ---
  # Exposes the VM's Podman socket as TCP so other containers can provision workspaces
  # Required for nested container provisioning (execution-worker creating agent workspaces)
  podman-socket-proxy:
    image: docker.io/alpine/socat:1.0.5
    module: agents
    privileged: true
    ports:
      - "8888:8888"
    volumes:
      # Mount the Podman socket from the VM (Fedora CoreOS user 501)
      - "/run/user/501/podman/podman.sock:/run/podman/podman.sock"
    command:
      - "tcp-listen:8888,reuseaddr,fork"
      - "unix-connect:/run/podman/podman.sock"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8888 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    healthcheck_timeout_s: 30

  # --- Execution Worker Service (Queue Consumer) ---
  # Consumes jobs from Redis Streams, provisions workspaces via AmpOrchestrator
  # Workspaces are created on-demand when jobs arrive (lazy provisioning)
  # Scale horizontally: amprealize scale execution-worker --replicas 3
  execution-worker:
    image: docker.io/library/python:3.11-slim-bookworm
    module: agents
    depends_on:
      - redis
      - guideai-db
      - podman-socket-proxy
    volumes:
      - "${GUIDEAI_REPO_ROOT:-.}:/app"
      - "execution-worker-pip-cache:/root/.cache/pip"
    workdir: /app
    command:
      - "sh"
      - "-c"
      - "pip install -e . -e ./packages/execution-queue -e ./packages/raze -e ./packages/amprealize && python -m guideai.execution_worker"
    environment:
      # Redis Streams connection
      REDIS_URL: "redis://redis:6379/0"
      # Consumer identity
      WORKER_ID: "${HOSTNAME:-worker-1}"
      CONSUMER_GROUP: "guideai-workers"
      # Database connections
      DATABASE_URL: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      TELEMETRY_DATABASE_URL: "postgresql://${GUIDEAI_PG_USER_TELEMETRY:-telemetry}:${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_dev}@telemetry-db:5432/${GUIDEAI_PG_DB_TELEMETRY:-telemetry}"
      # Podman API via socket proxy (AmpOrchestrator)
      PODMAN_HOST: "tcp://podman-socket-proxy:8888"
      # LLM Provider API Keys
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      # Worker tuning
      WORKER_HEARTBEAT_INTERVAL_S: "30"
      WORKER_CLAIM_TIMEOUT_MS: "300000"  # 5 minutes per job claim
      WORKER_MAX_RETRIES: "3"
      # Workspace provisioning (on-demand when jobs arrive)
      PROVISION_WORKSPACE: "true"
      WORKSPACE_DEFAULT_IMAGE: "docker.io/library/python:3.11-slim"
      WORKSPACE_DEFAULT_MEMORY: "2g"
      WORKSPACE_DEFAULT_CPU: "2.0"
    extra_hosts:
      - "host.containers.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "grep -r execution_worker /proc/*/cmdline >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    healthcheck_timeout_s: 120

  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # MODULE: CONSOLE (Local API + Web Console + Gateway)
  # ---------------------------------------------------------------------------
  # --- Gateway - Edge proxy with rate limiting, WebSocket support ---
  # NOTE: Gateway is in console module because it depends on guideai-api
  gateway:
    image: docker.io/library/nginx:alpine
    module: console
    ports:
      - "${GATEWAY_PORT:-8080}:80"
      - "${GATEWAY_TLS_PORT:-8443}:443"
    depends_on:
      - guideai-api
      - web-console
    volumes:
      - "${GUIDEAI_REPO_ROOT:-.}/config/nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro"
      - "${GUIDEAI_REPO_ROOT:-.}/config/nginx/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro"
    environment:
      # Optional TLS — set NGINX_SSL_CERT and NGINX_SSL_KEY to enable HTTPS.
      # Mount cert/key files via additional volumes, then point these vars at
      # the in-container paths.  NGINX_SSL_REDIRECT=true adds HTTP→HTTPS redirect.
      NGINX_SSL_CERT: "${NGINX_SSL_CERT:-}"
      NGINX_SSL_KEY: "${NGINX_SSL_KEY:-}"
      NGINX_SSL_REDIRECT: "${NGINX_SSL_REDIRECT:-false}"
    command: ["/bin/sh", "/docker-entrypoint-custom.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    healthcheck_timeout_s: 60

  guideai-api:
    image: docker.io/library/python:3.11-slim-bookworm
    module: console
    ports:
      - "${GUIDEAI_API_PORT:-8000}:8000"
    depends_on:
      - guideai-db
      - telemetry-db
      - redis
    extra_hosts:
      - "host.containers.internal:host-gateway"
    volumes:
      - "${GUIDEAI_REPO_ROOT:-.}:/app"
      - "guideai-api-pip-cache:/root/.cache/pip"
    workdir: /app
    command:
      - "sh"
      - "-c"
      - "pip install -e . -e ./packages/raze -e ./packages/amprealize -e ./packages/execution-queue && uvicorn guideai.api:app --host 0.0.0.0 --port 8000 --workers ${GUIDEAI_API_WORKERS:-1} --log-level info"
    environment:
      # Podman API for workspace provisioning (when using queue mode)
      PODMAN_HOST: "${PODMAN_HOST:-tcp://host.containers.internal:8888}"
      # =========================================================================
      # NEW: Consolidated database connection (schema-based routing)
      # =========================================================================
      # Default search_path includes all schemas for maximum compatibility
      DATABASE_URL: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dauth,execution,board,behavior,workflow,consent,audit,public"
      TELEMETRY_DATABASE_URL: "postgresql://${GUIDEAI_PG_USER_TELEMETRY:-telemetry}:${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_dev}@telemetry-db:5432/${GUIDEAI_PG_DB_TELEMETRY:-telemetry}"
      # Explicit Org DSN for OrganizationService (auth schema first)
      GUIDEAI_ORG_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dauth,execution,board,behavior,workflow,consent,audit,public"

      # =========================================================================
      # LEGACY: Per-service DSNs (for backward compatibility during migration)
      # These all point to guideai-db now with search_path including all schemas
      # =========================================================================
      # search_path includes: auth, execution, board, behavior, workflow, consent, audit, public
      GUIDEAI_AUTH_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dauth,execution,board,behavior,workflow,consent,audit,public"
      GUIDEAI_BOARD_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dboard,auth,execution,behavior,workflow,consent,audit,public"
      GUIDEAI_ACTION_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_RUN_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_EXECUTION_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_WORKFLOW_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dworkflow,auth,execution,board,behavior,consent,audit,public"
      GUIDEAI_BEHAVIOR_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dbehavior,auth,execution,board,workflow,consent,audit,public"
      GUIDEAI_COMPLIANCE_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dconsent,auth,execution,board,behavior,workflow,audit,public"
      GUIDEAI_AGENT_ORCHESTRATOR_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_AGENT_REGISTRY_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_METRICS_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dauth,execution,board,behavior,workflow,consent,audit,public"
      GUIDEAI_TELEMETRY_PG_DSN: "postgresql://${GUIDEAI_PG_USER_TELEMETRY:-telemetry}:${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_dev}@telemetry-db:5432/${GUIDEAI_PG_DB_TELEMETRY:-telemetry}"

      # =========================================================================
      # OAuth settings (loaded from .env.google-oauth and .env.github-oauth)
      # Note: .env.github-oauth uses OAUTH_CLIENT_ID/SECRET, not GITHUB_* prefix
      # =========================================================================
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      # GitHub uses OAUTH_* vars from .env.github-oauth, GITHUB_* as override
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      # Also set OAUTH_* for legacy compatibility (some code uses these)
      OAUTH_CLIENT_ID: "${OAUTH_CLIENT_ID:-}"
      OAUTH_CLIENT_SECRET: "${OAUTH_CLIENT_SECRET:-}"

      # =========================================================================
      # GitHub App Configuration (for repository integration)
      # Private key path is relative to /app (mounted repo root)
      # =========================================================================
      GITHUB_APP_ID: "${GITHUB_APP_ID:-}"
      GITHUB_APP_SLUG: "${GITHUB_APP_SLUG:-}"
      GITHUB_APP_CLIENT_ID: "${GITHUB_APP_CLIENT_ID:-}"
      GITHUB_APP_CLIENT_SECRET: "${GITHUB_APP_CLIENT_SECRET:-}"
      GITHUB_APP_PRIVATE_KEY_PATH: "/app/secrets/${GITHUB_APP_PRIVATE_KEY_FILENAME:-github-app.pem}"
      GITHUB_APP_CALLBACK_URL: "${GITHUB_APP_CALLBACK_URL:-http://localhost:5173/auth/github-app/callback}"

      # =========================================================================
      # Application settings
      # =========================================================================
      GUIDEAI_CORS_ORIGINS: "http://localhost:${GUIDEAI_WEB_CONSOLE_PORT:-5173},http://localhost:5173,http://localhost:3000"
      GUIDEAI_DEVICE_VERIFICATION_URI: "http://localhost:${GUIDEAI_API_PORT:-8000}/v1/device/authorize"
      REDIS_URL: "redis://redis:6379/0"
      # Execution mode: 'direct' (inline) or 'queue' (worker processing)
      # Set to 'queue' when agents module is enabled for horizontal scaling
      EXECUTION_MODE: "${EXECUTION_MODE:-queue}"

      # =========================================================================
      # LLM Provider API Keys (for agent execution)
      # =========================================================================
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      # BYOK (Bring Your Own Key) credential encryption - required for persistent storage
      BYOK_ENCRYPTION_KEY: "${BYOK_ENCRYPTION_KEY:-F8mx5M0oI4byBM353Yu5dtcz8d4AxlEKl1cBf2FW0Y4=}"
    healthcheck_timeout_s: 90
    post_start_commands:
      # Run Alembic migrations to create all schemas and tables
      # Wait for pip install to finish before running (main command installs deps async)
      - command: ["sh", "-c", "while ! python -c 'import alembic' 2>/dev/null; do sleep 2; done && python -m alembic -c alembic.ini upgrade head"]
        description: "Run Alembic migrations (creates schemas: auth, board, behavior, execution, workflow, consent, audit)"
        timeout_s: 180
      # Run Telemetry Alembic migrations (separate TimescaleDB)
      - command: ["sh", "-c", "while ! python -c 'import alembic' 2>/dev/null; do sleep 2; done && python -m alembic -c alembic.telemetry.ini upgrade head"]
        description: "Run Telemetry Alembic migrations (creates TimescaleDB hypertables: telemetry_events, execution_traces)"
        timeout_s: 180

  # --- MCP Server (stdio transport for IDE/agent tooling) ---
  # Note: MCP uses stdio; we keep stdin open via tail so the server stays alive
  # in detached container runtime environments.
  guideai-mcp:
    image: docker.io/library/python:3.11-slim-bookworm
    module: console
    ports:
      - "${GUIDEAI_MCP_PORT:-3000}:3000"
    depends_on:
      - guideai-db
      - telemetry-db
      - redis
    extra_hosts:
      - "host.containers.internal:host-gateway"
    volumes:
      - "${GUIDEAI_REPO_ROOT:-.}:/app"
      - "guideai-mcp-pip-cache:/root/.cache/pip"
    workdir: /app
    command:
      - "sh"
      - "-c"
      - "pip install -e . -e ./packages/raze -e ./packages/amprealize -e ./packages/execution-queue && tail -f /dev/null | python -m guideai.mcp_server"
    environment:
      MCP_TRANSPORT: "${MCP_TRANSPORT:-stdio}"
      MCP_IDLE_TIMEOUT: "${MCP_IDLE_TIMEOUT:-3600}"
      MCP_SHUTDOWN_TIMEOUT: "${MCP_SHUTDOWN_TIMEOUT:-30}"
      REDIS_URL: "redis://redis:6379/0"

      # =========================================================================
      # Consolidated database connection (schema-based routing)
      # =========================================================================
      DATABASE_URL: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dauth,execution,board,behavior,workflow,consent,audit,public"
      # Catch-all fallback used by many MCP service inits
      GUIDEAI_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dauth,execution,board,behavior,workflow,consent,audit,public"
      GUIDEAI_ORG_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dauth,execution,board,behavior,workflow,consent,audit,public"

      # =========================================================================
      # Per-service DSNs (matches API service for full parity)
      # =========================================================================
      GUIDEAI_AUTH_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dauth,execution,board,behavior,workflow,consent,audit,public"
      GUIDEAI_BOARD_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dboard,auth,execution,behavior,workflow,consent,audit,public"
      GUIDEAI_ACTION_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_RUN_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_EXECUTION_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_BEHAVIOR_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dbehavior,auth,execution,board,workflow,consent,audit,public"
      GUIDEAI_WORKFLOW_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dworkflow,auth,execution,board,behavior,consent,audit,public"
      GUIDEAI_COMPLIANCE_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dconsent,auth,execution,board,behavior,workflow,audit,public"
      GUIDEAI_CONSENT_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dconsent,auth,execution,board,behavior,workflow,audit,public"
      GUIDEAI_AGENT_ORCHESTRATOR_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_AGENT_REGISTRY_PG_DSN: "postgresql://${GUIDEAI_PG_USER:-guideai}:${GUIDEAI_PG_PASS:-guideai_dev}@guideai-db:5432/${GUIDEAI_PG_DB:-guideai}?options=-csearch_path%3Dexecution,auth,board,behavior,workflow,consent,audit,public"
      GUIDEAI_METRICS_PG_DSN: "postgresql://${GUIDEAI_PG_USER_TELEMETRY:-telemetry}:${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_dev}@telemetry-db:5432/${GUIDEAI_PG_DB_TELEMETRY:-telemetry}"
      GUIDEAI_TELEMETRY_PG_DSN: "postgresql://${GUIDEAI_PG_USER_TELEMETRY:-telemetry}:${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_dev}@telemetry-db:5432/${GUIDEAI_PG_DB_TELEMETRY:-telemetry}"

      # LLM provider keys for MCP-triggered agent tasks
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
    healthcheck:
      test: ["CMD-SHELL", "grep -r guideai.mcp_server /proc/*/cmdline >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    healthcheck_timeout_s: 60

  web-console:
    image: docker.io/library/node:20-bullseye-slim
    module: console
    ports:
      - "${GUIDEAI_WEB_CONSOLE_PORT:-5173}:5173"
    volumes:
      - "${GUIDEAI_REPO_ROOT:-.}/web-console:/app"
      - "${GUIDEAI_REPO_ROOT:-.}/packages/collab-client:/app/packages/collab-client"
      - "guideai-web-console-node-modules:/app/node_modules"
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8080}"
      GUIDEAI_REPO_ROOT: "/app"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "200"
    command:
      - "sh"
      - "-lc"
      - "cd /app && npm ci --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    healthcheck_timeout_s: 180

  # ---------------------------------------------------------------------------
  # MODULE: STREAMING (Optional)
  # ---------------------------------------------------------------------------

  zookeeper:
    image: docker.io/confluentinc/cp-zookeeper:7.5.0
    module: streaming
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    healthcheck_timeout_s: 30

  kafka:
    image: docker.io/confluentinc/cp-kafka:7.5.0
    module: streaming
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT:-10092}:9092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-10092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    healthcheck_timeout_s: 120

  # ---------------------------------------------------------------------------
  # MODULE: MONITORING (Optional)
  # ---------------------------------------------------------------------------

  prometheus:
    image: docker.io/prom/prometheus:v2.47.0
    module: monitoring
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: docker.io/grafana/grafana:10.1.0
    module: monitoring
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  # Consolidated database volumes
  guideai-db-data:
    name: guideai-local-main-db
  telemetry-db-data:
    name: guideai-local-telemetry-db
  # Application volumes
  guideai-web-console-node-modules:
    name: guideai-local-web-console-node-modules
  guideai-api-pip-cache:
    name: guideai-local-api-pip-cache
  guideai-mcp-pip-cache:
    name: guideai-local-mcp-pip-cache
  execution-worker-pip-cache:
    name: guideai-local-execution-worker-pip-cache
