# Minimal Streaming Blueprint
# Only Kafka + Zookeeper + Telemetry DB for streaming tests
# Uses ~1GB RAM instead of ~4GB for full test suite
#
# Memory requirements:
#   - Telemetry DB: ~256MB
#   - Zookeeper: ~256MB
#   - Kafka: ~512MB
#   Total: ~1024MB (1GB)
#
# Usage:
#   ./scripts/run_tests.sh --amprealize --blueprint streaming-minimal --with-kafka -- tests/load/test_streaming_pipeline_load.py
#
# Services (3 total):
#   - Zookeeper: 2181
#   - Kafka: 10092 (external)
#   - Telemetry DB: 6432

name: streaming-minimal
version: 1.0.0

# =============================================================================
# MODULES - All enabled for this minimal blueprint
# =============================================================================
modules:
  streaming:
    description: "Kafka streaming pipeline"
    enabled: true

# =============================================================================
# SERVICES (3 containers only)
# =============================================================================
services:
  # --- Telemetry Database (Port 6432) ---
  # This is the only PostgreSQL needed for streaming tests
  telemetry-db:
    image: docker.io/timescale/timescaledb:latest-pg15
    module: streaming
    memory_mb: 256
    cpu_cores: 0.5
    ports:
      - "${GUIDEAI_PG_PORT_TELEMETRY:-6432}:5432"
    environment:
      POSTGRES_USER: "${GUIDEAI_PG_USER_TELEMETRY:-guideai_telemetry}"
      POSTGRES_PASSWORD: "${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_test_pass}"
      POSTGRES_DB: "${GUIDEAI_PG_DB_TELEMETRY:-guideai_telemetry}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Zookeeper (Port 2181) ---
  zookeeper:
    image: docker.io/confluentinc/cp-zookeeper:7.5.0
    module: streaming
    memory_mb: 256
    cpu_cores: 0.25
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Kafka (Port 10092 external, 9092 internal) ---
  # KAFKA_LISTENERS = what interfaces Kafka binds to (inside container)
  # KAFKA_ADVERTISED_LISTENERS = what clients use to connect (from outside)
  kafka:
    image: docker.io/confluentinc/cp-kafka:7.5.0
    module: streaming
    memory_mb: 512
    cpu_cores: 1.0
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT:-10092}:9092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Listen on all interfaces inside container (0.0.0.0)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      # Advertise external port for host connections, internal for container-to-container
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-10092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
