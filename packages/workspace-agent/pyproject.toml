[build-system]
requires = ["setuptools>=69.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "workspace-agent"
version = "0.1.0"
description = "Standalone workspace management service for isolated agent execution containers"
readme = "README.md"
requires-python = ">=3.10"
keywords = ["workspace", "agent", "container", "podman", "isolation"]
license = { text = "MIT" }
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
authors = [
  { name = "GuideAI Team", email = "team@guideai.dev" }
]
dependencies = [
  "pydantic>=2.5,<3.0",
  "podman>=5.0,<6.0",
]

[project.urls]
Documentation = "https://github.com/Nas4146/workspace-agent"
Source = "https://github.com/Nas4146/workspace-agent"
Issues = "https://github.com/Nas4146/workspace-agent/issues"

[project.optional-dependencies]
dev = [
  "pytest>=7.4,<9.0",
  "pytest-cov>=4.1,<6.0",
  "pytest-asyncio>=0.21,<1.0",
  "black>=23.0,<25.0",
  "isort>=5.12,<6.0",
  "mypy>=1.5,<2.0",
]
redis = [
  "redis>=5.0,<6.0",
]
# Note: gRPC support removed in favor of Amprealize orchestrator
# See packages/amprealize/ for the unified control plane
all = [
  "workspace-agent[redis]",
]

[project.scripts]
workspace-agent = "workspace_agent.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
workspace_agent = ["py.typed"]

[tool.pytest.ini_options]
minversion = "7.4"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
strict = true

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100
