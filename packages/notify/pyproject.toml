[build-system]
requires = ["setuptools>=69.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "notify"
version = "0.1.0"
description = "Multi-channel notification library supporting Email, Slack, SMS, and copy-link with template system"
readme = "README.md"
requires-python = ">=3.10"
keywords = ["notifications", "email", "slack", "sms", "messaging", "alerts"]
license = { text = "MIT" }
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Topic :: Communications",
  "Topic :: Communications :: Email",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
authors = [
  { name = "GuideAI Team", email = "team@guideai.dev" }
]
dependencies = [
  "pydantic>=2.5,<3.0",
  "jinja2>=3.1,<4.0",
  "httpx>=0.27,<1.0",
]

[project.urls]
Documentation = "https://github.com/Nas4146/notify"
Source = "https://github.com/Nas4146/notify"
Issues = "https://github.com/Nas4146/notify/issues"

[project.optional-dependencies]
dev = [
  "pytest>=7.4,<9.0",
  "pytest-cov>=4.1,<6.0",
  "pytest-asyncio>=0.21,<1.0",
  "pytest-mock>=3.12,<4.0",
  "httpx>=0.27,<1.0",
  "black>=23.0,<25.0",
  "isort>=5.12,<6.0",
  "mypy>=1.5,<2.0",
]
email = [
  "aiosmtplib>=3.0,<4.0",
  "sendgrid>=6.10,<7.0",
]
slack = [
  "slack-sdk>=3.26,<4.0",
]
sms = [
  "twilio>=8.10,<10.0",
]
fastapi = [
  "fastapi>=0.110,<1.0",
  "uvicorn>=0.30,<1.0",
]
all = [
  "notify[email,slack,sms,fastapi]",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
notify = ["py.typed", "templates/*.html", "templates/*.txt", "templates/*.json"]

[tool.pytest.ini_options]
minversion = "7.4"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
