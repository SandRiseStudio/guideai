# Raze Alembic Configuration
# Standalone migration environment for the raze logging package
# This is independent of guideai's main alembic environment

[alembic]
# Path to migration environment
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# having the original .py file
sourceless = false

# Version location specification
version_locations = %(here)s/alembic/versions

# Version path separator (unix by default)
version_path_separator = os

# Set to 'true' to search source files recursively
recursive_version_locations = false

# The output encoding used when revision files are written
output_encoding = utf-8

# Database URL - typically loaded from environment
# Uses RAZE_DATABASE_URL or falls back to GUIDEAI_DATABASE_URL
sqlalchemy.url =


[post_write_hooks]
# Format new migration files with ruff
hooks = ruff

ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
