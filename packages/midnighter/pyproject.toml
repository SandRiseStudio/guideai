[build-system]
requires = ["setuptools>=69.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "midnighter"
version = "0.1.0"
description = "Behavior-Conditioned Supervised Fine-Tuning (BC-SFT) library for training LLMs with procedural knowledge"
readme = "README.md"
requires-python = ">=3.10"
keywords = ["fine-tuning", "bc-sft", "llm", "machine-learning", "behavior-conditioning", "openai"]
license = { text = "MIT" }
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
authors = [
  { name = "GuideAI Team", email = "team@guideai.dev" }
]
dependencies = [
  "pydantic>=2.5,<3.0",
]

[project.urls]
Documentation = "https://github.com/Nas4146/midnighter"
Source = "https://github.com/Nas4146/midnighter"
Issues = "https://github.com/Nas4146/midnighter/issues"

[project.optional-dependencies]
openai = [
  "openai>=1.0.0,<2.0",
]
# Local training with PyTorch/Transformers - EXPERIMENTAL
# Requires GPU and significant resources
local = [
  "torch>=2.0,<3.0",
  "transformers>=4.35,<5.0",
  "datasets>=2.14,<3.0",
  "accelerate>=0.24,<1.0",
  "peft>=0.6,<1.0",  # LoRA/QLoRA support
  "bitsandbytes>=0.41,<1.0",  # Quantization
]
fastapi = [
  "fastapi>=0.110,<1.0",
  "uvicorn>=0.30,<1.0",
]
dev = [
  "pytest>=7.4,<9.0",
  "pytest-cov>=4.1,<6.0",
  "pytest-asyncio>=0.21,<1.0",
  "black>=23.0,<25.0",
  "isort>=5.12,<6.0",
  "mypy>=1.5,<2.0",
]
all = [
  "midnighter[openai,fastapi]",
]

[project.scripts]
mdnt = "mdnt.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
mdnt = ["py.typed"]

[tool.pytest.ini_options]
minversion = "7.4"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=mdnt",
    "--cov-report=term-missing:skip-covered",
]
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
    "local: marks tests requiring local GPU backend",
]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src/mdnt"]
omit = ["*/tests/*"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
