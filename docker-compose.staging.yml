version: '3.9'

# GuideAI Staging Stack
# Complete staging environment for MCP server and API with PostgreSQL backends
# Epic 6 - MCP Server Deployment
#
# Usage:
#   # Start core staging environment (PostgreSQL + Redis + API + MCP)
#   podman-compose -f docker-compose.staging.yml up -d
#
#   # Start with Kafka streaming
#   podman-compose -f docker-compose.staging.yml --profile with-streaming up -d
#
#   # Start with Prometheus/Grafana monitoring
#   podman-compose -f docker-compose.staging.yml --profile with-monitoring up -d
#
#   # Start with all optional services (NGINX + streaming + monitoring)
#   podman-compose -f docker-compose.staging.yml --profile with-nginx --profile with-streaming --profile with-monitoring up -d
#
#   # Check health status
#   podman-compose -f docker-compose.staging.yml ps
#
#   # View MCP server logs
#   podman-compose -f docker-compose.staging.yml logs -f guideai-mcp
#
#   # Stop environment
#   podman-compose -f docker-compose.staging.yml down

x-postgres-common: &postgres-common
  restart: unless-stopped
  networks:
    - guideai-staging-net

x-env-common: &env-common
  GUIDEAI_ENV: staging
  ENVIRONMENT: staging
  LOG_LEVEL: INFO

services:
  # ==========================================================================
  # PostgreSQL Databases (from docker-compose.postgres.yml pattern)
  # ==========================================================================

  postgres-telemetry:
    image: timescale/timescaledb:latest-pg16
    hostname: postgres-telemetry
    container_name: guideai-staging-telemetry
    <<: *postgres-common
    ports:
      - "6432:5432"
    environment:
      POSTGRES_DB: guideai_telemetry
      POSTGRES_USER: guideai_telemetry
      POSTGRES_PASSWORD: ${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_staging_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - staging-telemetry-data:/var/lib/postgresql/data
      - ./schema/migrations/001_create_telemetry_warehouse.sql:/docker-entrypoint-initdb.d/001_create_telemetry_warehouse.sql:ro
      - ./schema/migrations/012_create_metrics_service.sql:/docker-entrypoint-initdb.d/012_create_metrics_service.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_telemetry -d guideai_telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-behavior:
    image: pgvector/pgvector:pg16
    hostname: postgres-behavior
    container_name: guideai-staging-behavior
    <<: *postgres-common
    ports:
      - "6433:5432"
    environment:
      POSTGRES_DB: guideai_behavior
      POSTGRES_USER: guideai_behavior
      POSTGRES_PASSWORD: ${GUIDEAI_PG_PASS_BEHAVIOR:-behavior_staging_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - staging-behavior-data:/var/lib/postgresql/data
      - ./schema/migrations/002_create_behavior_service.sql:/docker-entrypoint-initdb.d/002_create_behavior_service.sql:ro
      - ./schema/migrations/010_create_behavior_embeddings.sql:/docker-entrypoint-initdb.d/010_create_behavior_embeddings.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_behavior -d guideai_behavior"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-workflow:
    image: postgres:16-alpine
    hostname: postgres-workflow
    container_name: guideai-staging-workflow
    <<: *postgres-common
    ports:
      - "6434:5432"
    environment:
      POSTGRES_DB: guideai_workflow
      POSTGRES_USER: guideai_workflow
      POSTGRES_PASSWORD: ${GUIDEAI_PG_PASS_WORKFLOW:-workflow_staging_pass}
    volumes:
      - staging-workflow-data:/var/lib/postgresql/data
      - ./schema/migrations/003_create_workflow_service.sql:/docker-entrypoint-initdb.d/003_create_workflow_service.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_workflow -d guideai_workflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-action:
    image: postgres:16-alpine
    hostname: postgres-action
    container_name: guideai-staging-action
    <<: *postgres-common
    ports:
      - "6435:5432"
    environment:
      POSTGRES_DB: guideai_action
      POSTGRES_USER: guideai_action
      POSTGRES_PASSWORD: ${GUIDEAI_PG_PASS_ACTION:-action_staging_pass}
    volumes:
      - staging-action-data:/var/lib/postgresql/data
      - ./schema/migrations/004_create_action_service.sql:/docker-entrypoint-initdb.d/004_create_action_service.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_action -d guideai_action"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-run:
    image: postgres:16-alpine
    hostname: postgres-run
    container_name: guideai-staging-run
    <<: *postgres-common
    ports:
      - "6436:5432"
    environment:
      POSTGRES_DB: guideai_run
      POSTGRES_USER: guideai_run
      POSTGRES_PASSWORD: ${GUIDEAI_PG_PASS_RUN:-run_staging_pass}
    volumes:
      - staging-run-data:/var/lib/postgresql/data
      - ./schema/migrations/005_create_run_service.sql:/docker-entrypoint-initdb.d/005_create_run_service.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_run -d guideai_run"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-compliance:
    image: postgres:16-alpine
    hostname: postgres-compliance
    container_name: guideai-staging-compliance
    <<: *postgres-common
    ports:
      - "6437:5432"
    environment:
      POSTGRES_DB: guideai_compliance
      POSTGRES_USER: guideai_compliance
      POSTGRES_PASSWORD: ${GUIDEAI_PG_PASS_COMPLIANCE:-compliance_staging_pass}
    volumes:
      - staging-compliance-data:/var/lib/postgresql/data
      - ./schema/migrations/006_create_compliance_service.sql:/docker-entrypoint-initdb.d/006_create_compliance_service.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_compliance -d guideai_compliance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis Cache
  # ==========================================================================

  redis-staging:
    image: redis:7-alpine
    hostname: redis-staging
    container_name: guideai-staging-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command:
      - "redis-server"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - guideai-staging-net

  # ==========================================================================
  # GuideAI Core API
  # ==========================================================================

  guideai-api:
    build:
      context: .
      dockerfile: Dockerfile.core
    hostname: guideai-api
    container_name: guideai-staging-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *env-common
      # PostgreSQL DSNs via host overrides (env injection for staging)
      GUIDEAI_PG_HOST_TELEMETRY: postgres-telemetry
      GUIDEAI_PG_PORT_TELEMETRY: "5432"
      GUIDEAI_PG_USER_TELEMETRY: guideai_telemetry
      GUIDEAI_PG_PASS_TELEMETRY: ${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_staging_pass}
      GUIDEAI_PG_DB_TELEMETRY: guideai_telemetry

      GUIDEAI_PG_HOST_BEHAVIOR: postgres-behavior
      GUIDEAI_PG_PORT_BEHAVIOR: "5432"
      GUIDEAI_PG_USER_BEHAVIOR: guideai_behavior
      GUIDEAI_PG_PASS_BEHAVIOR: ${GUIDEAI_PG_PASS_BEHAVIOR:-behavior_staging_pass}
      GUIDEAI_PG_DB_BEHAVIOR: guideai_behavior

      GUIDEAI_PG_HOST_WORKFLOW: postgres-workflow
      GUIDEAI_PG_PORT_WORKFLOW: "5432"
      GUIDEAI_PG_USER_WORKFLOW: guideai_workflow
      GUIDEAI_PG_PASS_WORKFLOW: ${GUIDEAI_PG_PASS_WORKFLOW:-workflow_staging_pass}
      GUIDEAI_PG_DB_WORKFLOW: guideai_workflow

      GUIDEAI_PG_HOST_ACTION: postgres-action
      GUIDEAI_PG_PORT_ACTION: "5432"
      GUIDEAI_PG_USER_ACTION: guideai_action
      GUIDEAI_PG_PASS_ACTION: ${GUIDEAI_PG_PASS_ACTION:-action_staging_pass}
      GUIDEAI_PG_DB_ACTION: guideai_action

      GUIDEAI_PG_HOST_RUN: postgres-run
      GUIDEAI_PG_PORT_RUN: "5432"
      GUIDEAI_PG_USER_RUN: guideai_run
      GUIDEAI_PG_PASS_RUN: ${GUIDEAI_PG_PASS_RUN:-run_staging_pass}
      GUIDEAI_PG_DB_RUN: guideai_run

      GUIDEAI_PG_HOST_COMPLIANCE: postgres-compliance
      GUIDEAI_PG_PORT_COMPLIANCE: "5432"
      GUIDEAI_PG_USER_COMPLIANCE: guideai_compliance
      GUIDEAI_PG_PASS_COMPLIANCE: ${GUIDEAI_PG_PASS_COMPLIANCE:-compliance_staging_pass}
      GUIDEAI_PG_DB_COMPLIANCE: guideai_compliance

      REDIS_URL: redis://redis-staging:6379/0

      # Embedding configuration (staging uses lightweight model)
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_MODEL_LAZY_LOAD: "true"
      EMBEDDING_ROLLOUT_PERCENTAGE: "10"

      # OAuth (inject via secrets in production)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-staging-jwt-secret-replace-in-prod}
    depends_on:
      postgres-telemetry:
        condition: service_healthy
      postgres-behavior:
        condition: service_healthy
      postgres-workflow:
        condition: service_healthy
      postgres-action:
        condition: service_healthy
      postgres-run:
        condition: service_healthy
      postgres-compliance:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - guideai-staging-net

  # ==========================================================================
  # GuideAI MCP Server (Epic 6 - Staging Deployment)
  # ==========================================================================

  guideai-mcp:
    build:
      context: .
      dockerfile: deployment/Dockerfile.mcp
    hostname: guideai-mcp
    container_name: guideai-staging-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      <<: *env-common
      MCP_TRANSPORT: stdio
      MCP_IDLE_TIMEOUT: "3600"
      MCP_SHUTDOWN_TIMEOUT: "30"

      # PostgreSQL DSNs via host overrides (env injection for staging)
      GUIDEAI_PG_HOST_TELEMETRY: postgres-telemetry
      GUIDEAI_PG_PORT_TELEMETRY: "5432"
      GUIDEAI_PG_USER_TELEMETRY: guideai_telemetry
      GUIDEAI_PG_PASS_TELEMETRY: ${GUIDEAI_PG_PASS_TELEMETRY:-telemetry_staging_pass}
      GUIDEAI_PG_DB_TELEMETRY: guideai_telemetry

      GUIDEAI_PG_HOST_BEHAVIOR: postgres-behavior
      GUIDEAI_PG_PORT_BEHAVIOR: "5432"
      GUIDEAI_PG_USER_BEHAVIOR: guideai_behavior
      GUIDEAI_PG_PASS_BEHAVIOR: ${GUIDEAI_PG_PASS_BEHAVIOR:-behavior_staging_pass}
      GUIDEAI_PG_DB_BEHAVIOR: guideai_behavior

      GUIDEAI_PG_HOST_WORKFLOW: postgres-workflow
      GUIDEAI_PG_PORT_WORKFLOW: "5432"
      GUIDEAI_PG_USER_WORKFLOW: guideai_workflow
      GUIDEAI_PG_PASS_WORKFLOW: ${GUIDEAI_PG_PASS_WORKFLOW:-workflow_staging_pass}
      GUIDEAI_PG_DB_WORKFLOW: guideai_workflow

      GUIDEAI_PG_HOST_ACTION: postgres-action
      GUIDEAI_PG_PORT_ACTION: "5432"
      GUIDEAI_PG_USER_ACTION: guideai_action
      GUIDEAI_PG_PASS_ACTION: ${GUIDEAI_PG_PASS_ACTION:-action_staging_pass}
      GUIDEAI_PG_DB_ACTION: guideai_action

      GUIDEAI_PG_HOST_RUN: postgres-run
      GUIDEAI_PG_PORT_RUN: "5432"
      GUIDEAI_PG_USER_RUN: guideai_run
      GUIDEAI_PG_PASS_RUN: ${GUIDEAI_PG_PASS_RUN:-run_staging_pass}
      GUIDEAI_PG_DB_RUN: guideai_run

      GUIDEAI_PG_HOST_COMPLIANCE: postgres-compliance
      GUIDEAI_PG_PORT_COMPLIANCE: "5432"
      GUIDEAI_PG_USER_COMPLIANCE: guideai_compliance
      GUIDEAI_PG_PASS_COMPLIANCE: ${GUIDEAI_PG_PASS_COMPLIANCE:-compliance_staging_pass}
      GUIDEAI_PG_DB_COMPLIANCE: guideai_compliance

      REDIS_URL: redis://redis-staging:6379/0

      # Embedding configuration (staging uses lightweight model)
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_MODEL_LAZY_LOAD: "true"
      EMBEDDING_ROLLOUT_PERCENTAGE: "10"

      # OAuth (inject via secrets in production)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-staging-jwt-secret-replace-in-prod}
    depends_on:
      postgres-telemetry:
        condition: service_healthy
      postgres-behavior:
        condition: service_healthy
      postgres-workflow:
        condition: service_healthy
      postgres-action:
        condition: service_healthy
      postgres-run:
        condition: service_healthy
      postgres-compliance:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    # Health check defined in Dockerfile.mcp via HEALTHCHECK instruction
    networks:
      - guideai-staging-net

  # ==========================================================================
  # NGINX Reverse Proxy (Optional - for TLS termination in staging)
  # ==========================================================================

  nginx-staging:
    image: nginx:alpine
    hostname: nginx-staging
    container_name: guideai-staging-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/config/nginx-staging.conf:/etc/nginx/nginx.conf:ro
      # TLS certificates (mount from host or secrets manager)
      # - ./deployment/certs/staging.crt:/etc/nginx/ssl/staging.crt:ro
      # - ./deployment/certs/staging.key:/etc/nginx/ssl/staging.key:ro
    depends_on:
      - guideai-api
      - guideai-mcp
    networks:
      - guideai-staging-net
    profiles:
      - with-nginx  # Only start with: podman-compose --profile with-nginx up

  # ==========================================================================
  # PostgreSQL Agent Orchestrator (Port 6438)
  # ==========================================================================

  postgres-agent-orchestrator:
    image: postgres:16-alpine
    hostname: postgres-agent-orchestrator
    container_name: guideai-staging-agent-orchestrator
    <<: *postgres-common
    ports:
      - "6438:5432"
    environment:
      POSTGRES_DB: guideai
      POSTGRES_USER: guideai_user
      POSTGRES_PASSWORD: ${GUIDEAI_PG_PASS_AGENT_ORCHESTRATOR:-agent_orchestrator_staging_pass}
    volumes:
      - staging-agent-orchestrator-data:/var/lib/postgresql/data
      - ./schema/migrations/011_create_agent_orchestrator.sql:/docker-entrypoint-initdb.d/011_create_agent_orchestrator.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_user -d guideai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Kafka Streaming (Optional - with-streaming profile)
  # ==========================================================================

  zookeeper-staging:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper-staging
    container_name: guideai-staging-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - staging-zookeeper-data:/var/lib/zookeeper/data
      - staging-zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guideai-staging-net
    profiles:
      - with-streaming

  kafka-staging:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka-staging
    container_name: guideai-staging-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper-staging:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-staging:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_COMPRESSION_TYPE: "gzip"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - staging-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    depends_on:
      zookeeper-staging:
        condition: service_healthy
    networks:
      - guideai-staging-net
    profiles:
      - with-streaming
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  schema-registry-staging:
    image: confluentinc/cp-schema-registry:7.5.0
    hostname: schema-registry-staging
    container_name: guideai-staging-schema-registry
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry-staging
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka-staging:29092"
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_GROUP_ID: guideai-staging-schema-registry
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      kafka-staging:
        condition: service_healthy
    networks:
      - guideai-staging-net
    profiles:
      - with-streaming

  kafka-init-staging:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka-init-staging
    container_name: guideai-staging-kafka-init
    depends_on:
      kafka-staging:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics for staging...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka-staging:29092 \
        --topic telemetry.events \
        --partitions 6 \
        --replication-factor 1 \
        --config compression.type=gzip \
        --config retention.ms=604800000

      kafka-topics --create --if-not-exists --bootstrap-server kafka-staging:29092 \
        --topic telemetry.traces \
        --partitions 6 \
        --replication-factor 1 \
        --config compression.type=gzip \
        --config retention.ms=604800000

      kafka-topics --create --if-not-exists --bootstrap-server kafka-staging:29092 \
        --topic telemetry.metrics \
        --partitions 3 \
        --replication-factor 1 \
        --config compression.type=gzip \
        --config retention.ms=2592000000

      kafka-topics --create --if-not-exists --bootstrap-server kafka-staging:29092 \
        --topic pipeline.health \
        --partitions 1 \
        --replication-factor 1

      echo 'Kafka topics created:'
      kafka-topics --list --bootstrap-server kafka-staging:29092
      "
    networks:
      - guideai-staging-net
    profiles:
      - with-streaming

  # ==========================================================================
  # Prometheus/Grafana Monitoring (Optional - with-monitoring profile)
  # ==========================================================================

  prometheus-staging:
    image: prom/prometheus:v2.47.0
    hostname: prometheus-staging
    container_name: guideai-staging-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - staging-prometheus-data:/prometheus
      - ./deployment/config/prometheus-staging.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - guideai-staging-net
    profiles:
      - with-monitoring

  grafana-staging:
    image: grafana/grafana:10.1.0
    hostname: grafana-staging
    container_name: guideai-staging-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel"
    volumes:
      - staging-grafana-data:/var/lib/grafana
      - ./deployment/config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployment/config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus-staging:
        condition: service_healthy
    networks:
      - guideai-staging-net
    profiles:
      - with-monitoring

volumes:
  # Core datastores
  staging-telemetry-data:
    driver: local
  staging-behavior-data:
    driver: local
  staging-workflow-data:
    driver: local
  staging-action-data:
    driver: local
  staging-run-data:
    driver: local
  staging-compliance-data:
    driver: local
  staging-agent-orchestrator-data:
    driver: local
  # Streaming module volumes
  staging-zookeeper-data:
    driver: local
  staging-zookeeper-log:
    driver: local
  staging-kafka-data:
    driver: local
  # Monitoring module volumes
  staging-prometheus-data:
    driver: local
  staging-grafana-data:
    driver: local

networks:
  guideai-staging-net:
    driver: bridge

# ==========================================================================
# Deployment Instructions
# ==========================================================================
#
# CORE STAGING (PostgreSQL + Redis + API + MCP):
#   podman-compose -f docker-compose.staging.yml up -d
#
# WITH KAFKA STREAMING:
#   podman-compose -f docker-compose.staging.yml --profile with-streaming up -d
#
# WITH PROMETHEUS/GRAFANA MONITORING:
#   podman-compose -f docker-compose.staging.yml --profile with-monitoring up -d
#
# FULL STACK (all profiles):
#   podman-compose -f docker-compose.staging.yml --profile with-nginx --profile with-streaming --profile with-monitoring up -d
#
# VIA AMPREALIZE:
#   # Core only
#   amprealize plan --blueprint staging --env staging
#   amprealize apply
#
#   # With streaming
#   amprealize plan --blueprint staging --env staging --modules core,streaming
#   amprealize apply
#
#   # Full stack
#   amprealize plan --blueprint staging --env staging --modules core,streaming,monitoring
#   amprealize apply
#
# CHECK SERVICE HEALTH:
#   podman-compose -f docker-compose.staging.yml ps
#   curl http://localhost:8000/health
#
# TEST MCP SERVER:
#   echo '{"jsonrpc":"2.0","id":"1","method":"health"}' | \
#     podman exec -i guideai-staging-mcp python -m guideai.mcp_server
#
# VIEW LOGS:
#   podman-compose -f docker-compose.staging.yml logs -f guideai-mcp
#   podman-compose -f docker-compose.staging.yml logs -f kafka-staging
#   podman-compose -f docker-compose.staging.yml logs -f prometheus-staging
#
# OVERRIDE PASSWORDS (via .env file):
#   Create .env.staging with:
#     GUIDEAI_PG_PASS_TELEMETRY=your_secure_password
#     GUIDEAI_PG_PASS_BEHAVIOR=your_secure_password
#     GRAFANA_ADMIN_PASSWORD=your_grafana_password
#     ...
#   Then: podman-compose -f docker-compose.staging.yml --env-file .env.staging up -d
#
# STOP AND CLEAN UP:
#   podman-compose -f docker-compose.staging.yml down
#   # Remove volumes too:
#   podman-compose -f docker-compose.staging.yml down -v
