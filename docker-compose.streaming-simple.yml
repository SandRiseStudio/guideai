version: '3.8'

services:
  # Single Zookeeper node for simplicity
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: guideai-zookeeper-simple
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - streaming
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Single Kafka broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: guideai-kafka-simple
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_COMPRESSION_TYPE: 'gzip'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - streaming
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: guideai-schema-registry-simple
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_GROUP_ID: guideai-schema-registry
      SCHEMA_REGISTRY_LEADER_ELIGIBILITY: 'true'
    networks:
      - streaming
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flink Job Manager
  flink-jobmanager:
    image: apache/flink:1.18-scala_2.12
    container_name: guideai-flink-jobmanager-simple
    hostname: flink-jobmanager
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8081"
      - "6123:6123"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        jobmanager.memory.process.size: 2048m
        state.backend: rocksdb
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
    command: jobmanager
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
      - flink_savepoints:/tmp/flink-savepoints
    networks:
      - streaming

  # Flink Task Manager (single instance for testing)
  flink-taskmanager:
    image: apache/flink:1.18-scala_2.12
    container_name: guideai-flink-taskmanager-simple
    hostname: flink-taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.memory.process.size: 4096m
        taskmanager.memory.managed.size: 2048m
        taskmanager.numberOfTaskSlots: 4
    command: taskmanager
    networks:
      - streaming
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # Kafka topic initialization
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: guideai-kafka-init-simple
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      # Wait for Kafka to be ready
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 60

      # Create topics (single partition for simplicity, can scale later)
      echo 'Creating Kafka topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic telemetry.events \
        --partitions 6 \
        --replication-factor 1 \
        --config compression.type=gzip \
        --config retention.ms=604800000

      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic telemetry.traces \
        --partitions 6 \
        --replication-factor 1 \
        --config compression.type=gzip \
        --config retention.ms=604800000

      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic pipeline.health \
        --partitions 1 \
        --replication-factor 1

      echo 'Topics created successfully'
      kafka-topics --list --bootstrap-server kafka:29092
      "
    networks:
      - streaming

volumes:
  zookeeper_data:
    name: guideai-zookeeper-data-simple
  zookeeper_log:
    name: guideai-zookeeper-log-simple
  kafka_data:
    name: guideai-kafka-data-simple
  flink_checkpoints:
    name: guideai-flink-checkpoints-simple
  flink_savepoints:
    name: guideai-flink-savepoints-simple

networks:
  streaming:
    name: guideai-streaming-simple
    driver: bridge
