  postgres-run-test:
    container_name: guideai-postgres-run-test
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guideai_run
      POSTGRES_PASSWORD: run_test_pass
      POSTGRES_DB: guideai_run
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6436:5432"  # Dev uses 5436, test uses 6436
    volumes:
      - postgres-run-test-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_run"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guideai-test-net

  postgres-compliance-test:
    container_name: guideai-postgres-compliance-test
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guideai_compliance
      POSTGRES_PASSWORD: compliance_test_pass
      POSTGRES_DB: guideai_compliance
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6437:5432"  # Dev uses 5437, test uses 6437
    volumes:
      - postgres-compliance-test-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
