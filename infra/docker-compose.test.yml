    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: guideai_metrics_user
      POSTGRES_PASSWORD: local_metrics_dev_pw
      POSTGRES_DB: guideai_metrics
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6439:5432"  # Dev uses 5439, test uses 6439
    volumes:
      - postgres-metrics-test-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
