# docker-compose.test.yml
# CI/Test environment service containers mirroring production setup
# Usage: docker-compose -f docker-compose.test.yml up -d
# Ports offset by +1000 from dev to avoid conflicts

version: '3.8'

services:
  # ==========================================================================
  # PostgreSQL Services (5 databases - behavior, workflow, action, run, compliance)
  # ==========================================================================

  postgres-behavior-test:
    container_name: guideai-postgres-behavior-test
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: guideai_behavior
      POSTGRES_PASSWORD: behavior_test_pass
      POSTGRES_DB: guideai_behavior
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6433:5432"  # Dev uses 5433, test uses 6433
    volumes:
      - postgres-behavior-test-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_behavior"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guideai-test-net

  postgres-workflow-test:
    container_name: guideai-postgres-workflow-test
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guideai_workflow
      POSTGRES_PASSWORD: workflow_test_pass
      POSTGRES_DB: guideai_workflow
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6434:5432"  # Dev uses 5434, test uses 6434
    volumes:
      - postgres-workflow-test-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_workflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guideai-test-net

  postgres-action-test:
    container_name: guideai-postgres-action-test
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guideai_action
      POSTGRES_PASSWORD: action_test_pass
      POSTGRES_DB: guideai_action
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6435:5432"  # Dev uses 5435, test uses 6435
    volumes:
      - postgres-action-test-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_action"]
