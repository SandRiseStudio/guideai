    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: guideai_telemetry
      POSTGRES_PASSWORD: telemetry_test_pass
      POSTGRES_DB: guideai_telemetry
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6432:5432"  # Dev uses 5432, test uses 6432
    volumes:
