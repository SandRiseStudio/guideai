  # ==========================================================================
  # PostgreSQL Auth Service
  # ==========================================================================

  postgres-auth-test:
    container_name: guideai-postgres-auth-test
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guideai_auth
      POSTGRES_PASSWORD: auth_test_pass
      POSTGRES_DB: guideai_auth
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6440:5432"  # Dev uses 5440, test uses 6440
    volumes:
      - postgres-auth-test-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guideai-test-net

  # ==========================================================================
  # Redis Cache
  # ==========================================================================

  redis-test:
    container_name: guideai-redis-test
    image: redis:7-alpine
    ports:
      - "6479:6379"  # Dev uses 6379, test uses 6479
    volumes:
      - redis-test-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - guideai-test-net
    command: redis-server --appendonly yes

  # ==========================================================================
  # Kafka + Zookeeper (Telemetry Pipeline)
  # ==========================================================================

  zookeeper-test:
    container_name: guideai-zookeeper-test
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "3181:2181"  # Dev uses 2181, test uses 3181
    volumes:
      - zookeeper-test-data:/var/lib/zookeeper/data
      - zookeeper-test-log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guideai-test-net

  kafka-test:
    container_name: guideai-kafka-test
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper-test:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-test:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:10092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-test:9092,PLAINTEXT_HOST://localhost:10092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx256M"
    command: >-
      bash -c "
        echo 'Waiting for stale /brokers/ids/1 entries to clear before starting Kafka...'
        for attempt in $(seq 1 20); do
          if zookeeper-shell zookeeper-test:2181 stat /brokers/ids/1 >/dev/null 2>&1; then
            echo \"  entry still present (attempt $${attempt}/20); sleeping 2s\"
            sleep 2
          else
            echo '  broker slot is free'
            break
          fi
        done
        if zookeeper-shell zookeeper-test:2181 stat /brokers/ids/1 >/dev/null 2>&1; then
          echo '  forcing delete of stale broker registration'
          zookeeper-shell zookeeper-test:2181 delete /brokers/ids/1 >/dev/null 2>&1 || true
        fi
        exec /etc/confluent/docker/run
      "
    ports:
      - "10092:10092"  # Dev uses 9092, test uses 10092
    volumes:
      - kafka-test-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          memory: 384M
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - guideai-test-net

  # ==========================================================================
  # NGINX - Reverse Proxy for API Server
  # ==========================================================================
  # Proxies requests to the host machine's API server (started by test runner)
  # This allows testing NGINX routing behavior in CI/test environments

  nginx-test:
    container_name: guideai-nginx-test
    image: nginx:alpine
    environment:
      # Point to host machine where test runner starts the API server
      # host.docker.internal works for Docker Desktop, host.containers.internal for Podman
      - GUIDEAI_STAGING_UPSTREAM_HOST=${GUIDEAI_TEST_API_HOST:-host.containers.internal}
      - GUIDEAI_STAGING_UPSTREAM_PORT=${GUIDEAI_TEST_API_PORT:-8000}
      - "NGINX_TEMPLATE_VARS=GUIDEAI_STAGING_UPSTREAM_HOST GUIDEAI_STAGING_UPSTREAM_PORT"
    volumes:
      - ./deployment/config/nginx-staging.conf:/etc/nginx/nginx.conf.template:ro
      - ./deployment/scripts/nginx-entrypoint.sh:/etc/nginx/start-guideai.sh:ro
    ports:
      - "8080:80"
    command: ["/bin/sh", "/etc/nginx/start-guideai.sh"]
    extra_hosts:
      # Ensure host.containers.internal resolves (for Podman on Linux)
      - "host.containers.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - guideai-test-net

volumes:
  postgres-behavior-test-data:
  postgres-workflow-test-data:
  postgres-action-test-data:
  postgres-run-test-data:
  postgres-compliance-test-data:
  postgres-telemetry-test-data:
  postgres-metrics-test-data:
  postgres-auth-test-data:
  redis-test-data:
  zookeeper-test-data:
  zookeeper-test-log:
  kafka-test-data:

networks:
  guideai-test-net:
    driver: bridge
