version: '3.8'

# GuideAI Staging Environment with Core Services
# Last Updated: 2025-12-19
# Purpose: Full staging deployment with API, MCP, PostgreSQL, and Redis
# Services: guideai-api, guideai-mcp, postgres (6 databases), redis, nginx

networks:
  guideai-postgres-net:
    external: true
    name: guideai-postgres-net

volumes:
  redis-staging-data:
    name: guideai-staging-redis

services:
  # ==========================================================================
  # GuideAI Core API Service
  # ==========================================================================
  guideai-api:
    image: localhost:5001/guideai-core:staging
    container_name: guideai-api-staging
    env_file:
      - staging.env
    environment:
      - POSTGRES_HOST=host.containers.internal
      - REDIS_HOST=redis-staging
      - API_PORT=8000
      - ENVIRONMENT=staging
    networks:
      - guideai-postgres-net
    ports:
      - "8000:8000"
    depends_on:
      - redis-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # ==========================================================================
  # GuideAI MCP Server
  # ==========================================================================
  guideai-mcp:
    image: localhost:5001/guideai-mcp:staging
    container_name: guideai-mcp-staging
    env_file:
      - staging.env
    environment:
      - POSTGRES_HOST=host.containers.internal
      - REDIS_HOST=redis-staging
      - MCP_PORT=3000
      - MCP_TRANSPORT=stdio
      - ENVIRONMENT=staging
    networks:
      - guideai-postgres-net
    ports:
      - "3000:3000"
    depends_on:
      - redis-staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================================================
  # Redis - Cache & Session Store
  # ==========================================================================
  redis-staging:
    image: redis:7-alpine
    container_name: guideai-redis-staging
    command: >-
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel notice
    volumes:
      - redis-staging-data:/data
    networks:
      - guideai-postgres-net
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==========================================================================
  # NGINX - Reverse Proxy & Load Balancer
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: guideai-nginx-staging
    environment:
      - GUIDEAI_STAGING_UPSTREAM_HOST=${GUIDEAI_STAGING_UPSTREAM_HOST:-guideai-api-staging}
      - GUIDEAI_STAGING_UPSTREAM_PORT=${GUIDEAI_STAGING_UPSTREAM_PORT:-8000}
      - "NGINX_TEMPLATE_VARS=GUIDEAI_STAGING_UPSTREAM_HOST GUIDEAI_STAGING_UPSTREAM_PORT"
    volumes:
      - ./config/nginx-staging.conf:/etc/nginx/nginx.conf.template:ro
      - ./scripts/nginx-entrypoint.sh:/etc/nginx/start-guideai.sh:ro
    networks:
      - guideai-postgres-net
    ports:
      - "8080:80"
      - "8443:443"
    command: ["/bin/sh", "/etc/nginx/start-guideai.sh"]
    depends_on:
      - guideai-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
