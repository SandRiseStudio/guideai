# Prometheus Alert Rules for GuideAI Embedding Optimization (Phase 1)
# Phase 1 SLO Targets: P95 latency <250ms, memory <750MB, quality nDCG@5 >0.85

groups:
  - name: embedding_optimization_slo
    interval: 30s
    rules:
      # P95 Latency SLO Violation (<250ms target)
      - alert: EmbeddingRetrievalLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(guideai_retrieval_latency_seconds_bucket[5m])) by (le, strategy)) > 0.250
        for: 5m
        labels:
          severity: page
          component: embedding
          slo: latency
        annotations:
          summary: "Embedding retrieval P95 latency exceeds 250ms SLO"
          description: "Strategy {{ $labels.strategy }} P95 latency is {{ $value | humanizeDuration }}, exceeding the 250ms SLO target for 5 minutes."
          runbook: "https://docs.guideai.internal/runbooks/embedding-latency-high"
          impact: "User-perceived slowness in behavior retrieval, potential timeout cascade"
          action: |
            1. Check BehaviorRetriever._load_model() for lazy loading delays
            2. Verify FAISS index size (guideai_faiss_index_behaviors_total)
            3. Review cache hit ratio (should be >30%)
            4. Check for concurrent index rebuilds
            5. Consider scaling retrieval workers or increasing cache TTL

      # Memory SLO Violation (<750MB target)
      - alert: EmbeddingModelMemoryHigh
        expr: guideai_embedding_model_memory_bytes > 750 * 1024 * 1024
        for: 2m
        labels:
          severity: page
          component: embedding
          slo: memory
        annotations:
          summary: "Embedding model memory footprint exceeds 750MB SLO"
          description: "Model {{ $labels.model_name }} memory usage is {{ $value | humanizeBytes }}, exceeding the 750MB SLO target."
          runbook: "https://docs.guideai.internal/runbooks/embedding-memory-high"
          impact: "Risk of OOM kills, reduced headroom for traffic spikes"
          action: |
            1. Verify EMBEDDING_MODEL_NAME (should be all-MiniLM-L6-v2, not BGE-M3)
            2. Check for model singleton sharing (guideai_embedding_model_load_count_total should be 1)
            3. Review process RSS via `ps aux | grep uvicorn`
            4. Consider Phase 3 quantization if BGE-M3 still in use
            5. Investigate potential memory leaks in BehaviorRetriever

      # Cache Efficiency Degradation (>30% hit rate expected)
      - alert: EmbeddingCacheHitRateLow
        expr: |
          sum(rate(guideai_retrieval_cache_hits_total[10m])) by (strategy) /
          (sum(rate(guideai_retrieval_cache_hits_total[10m])) by (strategy) +
           sum(rate(guideai_retrieval_cache_misses_total[10m])) by (strategy)) < 0.30
        for: 10m
        labels:
          severity: warning
          component: embedding
          slo: efficiency
        annotations:
          summary: "Retrieval cache hit rate below 30% threshold"
          description: "Strategy {{ $labels.strategy }} cache hit rate is {{ $value | humanizePercentage }}, below the 30% efficiency target."
          runbook: "https://docs.guideai.internal/runbooks/embedding-cache-low"
          impact: "Increased token consumption, higher embedding inference load"
          action: |
            1. Check Redis availability (get_cache() connectivity)
            2. Review cache TTL configuration (default 600s)
            3. Analyze query diversity (high cardinality reduces hit rate)
            4. Verify cache invalidation isn't over-aggressive
            5. Consider increasing cache TTL or warming high-frequency queries

      # Retrieval Failure Rate High (>5% error rate)
      - alert: EmbeddingRetrievalFailureRateHigh
        expr: |
          sum(rate(guideai_retrieval_failures_total[5m])) /
          sum(rate(guideai_retrieval_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          component: embedding
          slo: reliability
        annotations:
          summary: "Embedding retrieval failure rate exceeds 5%"
          description: "Retrieval failure rate is {{ $value | humanizePercentage }}, exceeding the 5% reliability threshold."
          runbook: "https://docs.guideai.internal/runbooks/embedding-failures-high"
          impact: "Users receiving errors, potential fallback to degraded keyword search"
          action: |
            1. Check error_type labels (guideai_retrieval_failures_total)
            2. Review BehaviorRetriever exception logs
            3. Verify FAISS index integrity (rebuild if corrupted)
            4. Check SentenceTransformer model availability
            5. Ensure semantic dependencies installed (sentence-transformers, faiss-cpu)

      # Degraded Mode Usage High (semantic unavailable)
      - alert: EmbeddingDegradedModeHigh
        expr: |
          sum(rate(guideai_retrieval_degraded_mode_total[10m])) /
          sum(rate(guideai_retrieval_requests_total[10m])) > 0.10
        for: 10m
        labels:
          severity: warning
          component: embedding
          slo: quality
        annotations:
          summary: "Embedding retrieval in degraded mode >10% of requests"
          description: "Degraded mode rate is {{ $value | humanizePercentage }}, indicating frequent semantic search unavailability."
          runbook: "https://docs.guideai.internal/runbooks/embedding-degraded-mode"
          impact: "Reduced retrieval quality, fallback to keyword search (lower nDCG@5)"
          action: |
            1. Check reason labels (dependencies-missing, index-not-ready, model-load-failed)
            2. Verify [semantic] extras installed: pip install guideai[semantic]
            3. Check FAISS index build success (guideai_faiss_index_rebuild_total)
            4. Review model load errors in logs
            5. Ensure BehaviorService available for index population

      # Model Not Lazy Loaded (should load exactly once)
      - alert: EmbeddingModelNotLazyLoaded
        expr: guideai_embedding_model_load_count_total > 1
        for: 1m
        labels:
          severity: warning
          component: embedding
          slo: memory
        annotations:
          summary: "Embedding model loaded multiple times (lazy loading failure)"
          description: "Model load count is {{ $value }}, indicating singleton sharing failure."
          runbook: "https://docs.guideai.internal/runbooks/embedding-lazy-load-failed"
          impact: "Increased memory footprint, multiple model instances in memory"
          action: |
            1. Verify BehaviorRetriever._shared_model singleton pattern
            2. Check for multi-process uvicorn without --preload
            3. Review _model_lock thread safety
            4. Ensure EMBEDDING_MODEL_LAZY_LOAD=true (default)
            5. Restart workers to reset model singleton

      # FAISS Index Rebuild Storm (>2 rebuilds/hour unexpected)
      - alert: EmbeddingIndexRebuildStorm
        expr: rate(guideai_faiss_index_rebuild_total[1h]) > 2
        for: 10m
        labels:
          severity: warning
          component: embedding
          slo: stability
        annotations:
          summary: "FAISS index rebuild rate unusually high"
          description: "Index rebuilding {{ $value | humanize }} times per hour, expected <2/hour."
          runbook: "https://docs.guideai.internal/runbooks/embedding-index-rebuild-storm"
          impact: "Increased latency during rebuilds, cache invalidation churn"
          action: |
            1. Check for BehaviorService instability (behavior CRUD churn)
            2. Review ensure_ready() logic triggering unnecessary rebuilds
            3. Verify index persistence (filesystem + PostgreSQL dual-write)
            4. Check for concurrent workers rebuilding same index
            5. Investigate approval workflow causing repeated updates
