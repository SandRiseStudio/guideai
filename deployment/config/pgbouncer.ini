[databases]
telemetry = host=postgres-telemetry port=5432 dbname=telemetry user=guideai_telemetry password=dev_telemetry_pass
behaviors = host=postgres-behavior port=5432 dbname=behaviors user=guideai_behavior password=dev_behavior_pass
workflows = host=postgres-workflow port=5432 dbname=workflows user=guideai_workflow password=dev_workflow_pass
guideai_action = host=postgres-action port=5432 dbname=guideai_action user=guideai_user password=local_dev_pw
guideai_run = host=postgres-run port=5432 dbname=guideai_run user=guideai_user password=local_dev_pw
guideai_compliance = host=postgres-compliance port=5432 dbname=guideai_compliance user=guideai_user password=local_dev_pw

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
admin_users = guideai_admin
stats_users = guideai_admin
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 5
query_wait_timeout = 25
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60
