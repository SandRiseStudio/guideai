# ============================================================================
# Disaster Recovery Monitoring Configuration
# ============================================================================
# Reference: docs/DISASTER_RECOVERY_POLICY.md Section 6
# Purpose: Prometheus alerts for DR metrics and Alertmanager routing
# Last updated: 2025-01-XX (Epic 8.11 DR Automation)

# ============================================================================
# Prometheus Alert Rules
# ============================================================================
groups:
  - name: disaster_recovery
    interval: 60s
    rules:
      # ======================================================================
      # Backup Freshness Alerts
      # ======================================================================

      - alert: PostgreSQLBackupStale
        expr: |
          (time() - guideai_backup_last_success_timestamp{service="postgres"}) > 3900
        for: 5m
        labels:
          severity: critical
          category: backup
          service: postgres
          tier: tier1
        annotations:
          summary: "PostgreSQL backup is stale (> 65 minutes)"
          description: |
            PostgreSQL backup has not completed successfully in the last 65 minutes.
            Expected frequency: 1 hour (Tier 1 - 5min RPO)
            Last success: {{ $value | humanizeDuration }}
            Action: Check backup script logs and S3 upload status
            Runbook: docs/DISASTER_RECOVERY_POLICY.md - PostgreSQL Backup/Restore
          dashboard: "https://grafana.example.com/d/dr-backups/disaster-recovery-backups"

      - alert: RedisBackupStale
        expr: |
          (time() - guideai_backup_last_success_timestamp{service="redis"}) > 1200
        for: 5m
        labels:
          severity: critical
          category: backup
          service: redis
          tier: tier1
        annotations:
          summary: "Redis backup is stale (> 20 minutes)"
          description: |
            Redis backup has not completed successfully in the last 20 minutes.
            Expected frequency: 15 minutes (Tier 1 - 5min RPO)
            Last success: {{ $value | humanizeDuration }}
            Action: Check BGSAVE status and AOF persistence
            Runbook: docs/DISASTER_RECOVERY_POLICY.md - Redis Backup/Restore

      - alert: DuckDBBackupStale
        expr: |
          (time() - guideai_backup_last_success_timestamp{service="duckdb"}) > 5400
        for: 10m
        labels:
          severity: warning
          category: backup
          service: duckdb
          tier: tier2
        annotations:
          summary: "DuckDB backup is stale (> 90 minutes)"
          description: |
            DuckDB backup has not completed successfully in the last 90 minutes.
            Expected frequency: 1 hour (Tier 2 - 15min RPO)
            Last success: {{ $value | humanizeDuration }}
            Action: Check Parquet export process and Python backup script
            Runbook: docs/DISASTER_RECOVERY_POLICY.md - DuckDB Backup/Restore

      # ======================================================================
      # Backup Failure Alerts
      # ======================================================================

      - alert: BackupFailureRate
        expr: |
          rate(guideai_backup_failures_total[15m]) > 0.2
        for: 5m
        labels:
          severity: critical
          category: backup
        annotations:
          summary: "High backup failure rate detected"
          description: |
            Backup failure rate exceeds 20% over the last 15 minutes.
            Failed backups: {{ $value | humanizePercentage }}
            Action: Investigate S3 connectivity, disk space, and service health
            Command: guideai dr status
            Runbook: docs/DISASTER_RECOVERY_POLICY.md - Monitoring and Alerting

      - alert: BackupConsecutiveFailures
        expr: |
          increase(guideai_backup_failures_total[30m]) >= 3
        for: 1m
        labels:
          severity: critical
          category: backup
        annotations:
          summary: "Multiple consecutive backup failures (>= 3 in 30m)"
          description: |
            Service {{ $labels.service }} has failed 3+ backups in 30 minutes.
            This indicates a systemic issue requiring immediate attention.
            Action: Run test-failover and validate infrastructure health
            Command: guideai dr test-failover

      # ======================================================================
      # RTO/RPO Compliance Alerts
      # ======================================================================

      - alert: RTOViolation
        expr: |
          guideai_restore_time_seconds{tier="tier1"} > 900
        for: 1m
        labels:
          severity: critical
          category: compliance
          metric: rto
        annotations:
          summary: "RTO violation for Tier 1 service (> 15 minutes)"
          description: |
            Service {{ $labels.service }} restore time: {{ $value | humanizeDuration }}
            Tier 1 RTO target: 15 minutes
            Action: Review restore process bottlenecks and optimize
            Runbook: docs/DISASTER_RECOVERY_POLICY.md - Service Tier Classification

      - alert: RPOViolation
        expr: |
          (time() - guideai_backup_last_success_timestamp{tier="tier1"}) > 300
        for: 2m
        labels:
          severity: critical
          category: compliance
          metric: rpo
        annotations:
          summary: "RPO violation for Tier 1 service (> 5 minutes)"
          description: |
            Service {{ $labels.service }} last backup: {{ $value | humanizeDuration }} ago
            Tier 1 RPO target: 5 minutes
            Data loss risk: HIGH
            Action: Investigate backup process and consider continuous replication
            Runbook: docs/DISASTER_RECOVERY_POLICY.md - Service Tier Classification

      # ======================================================================
      # Service Health Alerts
      # ======================================================================

      - alert: PostgreSQLHealthCheckFailed
        expr: |
          guideai_postgres_health_check == 0
        for: 3m
        labels:
          severity: critical
          category: health
          service: postgres
        annotations:
          summary: "PostgreSQL health check failing"
          description: |
            PostgreSQL is not responding to health checks for 3+ minutes.
            This may indicate database downtime or connection issues.
            Action: Check PostgreSQL logs and service status
            Command: sudo systemctl status postgresql
            Command: guideai dr test-failover

      - alert: RedisHealthCheckFailed
        expr: |
          guideai_redis_health_check == 0
        for: 3m
        labels:
          severity: critical
          category: health
          service: redis
        annotations:
          summary: "Redis health check failing"
          description: |
            Redis is not responding to health checks for 3+ minutes.
            This may indicate Redis downtime or connection issues.
            Action: Check Redis logs and service status
            Command: sudo systemctl status redis
            Command: redis-cli ping

      # ======================================================================
      # Query Performance Alerts
      # ======================================================================

      - alert: PostgreSQLQueryLatencyHigh
        expr: |
          guideai_postgres_query_latency_seconds > 1.0
        for: 5m
        labels:
          severity: warning
          category: performance
          service: postgres
        annotations:
          summary: "PostgreSQL query latency exceeds 1 second"
          description: |
            PostgreSQL query latency: {{ $value }}s
            Expected: < 1s for health checks
            This may indicate database load or disk I/O issues.
            Action: Review slow query log and check disk performance
            Command: guideai dr test-failover

      - alert: RedisLatencyHigh
        expr: |
          max(guideai_redis_read_latency_seconds, guideai_redis_write_latency_seconds) > 0.1
        for: 5m
        labels:
          severity: warning
          category: performance
          service: redis
        annotations:
          summary: "Redis operation latency exceeds 100ms"
          description: |
            Redis operation latency: {{ $value }}s
            Expected: < 100ms for read/write operations
            This may indicate memory pressure or network issues.
            Action: Check Redis INFO stats and network connectivity
            Command: redis-cli --latency

      # ======================================================================
      # Replication Lag Alerts
      # ======================================================================

      - alert: PostgreSQLReplicationLag
        expr: |
          guideai_postgres_replication_lag_seconds > 60
        for: 5m
        labels:
          severity: warning
          category: replication
          service: postgres
        annotations:
          summary: "PostgreSQL replication lag exceeds 1 minute"
          description: |
            Replication lag from primary to standby: {{ $value | humanizeDuration }}
            This may delay failover and increase data loss risk.
            Action: Check network between primary and standby
            Action: Review WAL shipping performance
            Runbook: docs/DISASTER_RECOVERY_POLICY.md - PostgreSQL Backup/Restore

      # ======================================================================
      # Restore Test Alerts
      # ======================================================================

      - alert: RestoreTestFailed
        expr: |
          guideai_restore_test_success == 0
        for: 1m
        labels:
          severity: critical
          category: testing
        annotations:
          summary: "Automated restore test failed"
          description: |
            Service {{ $labels.service }} restore test validation failed.
            This indicates backups may not be restorable in a real disaster.
            Action: Review restore test logs and validate backup integrity
            Command: guideai dr test-failover
            Runbook: docs/DISASTER_RECOVERY_POLICY.md - Disaster Recovery Testing

      - alert: RestoreTestNotRun
        expr: |
          (time() - guideai_restore_test_last_run_timestamp) > 604800
        for: 1h
        labels:
          severity: warning
          category: testing
        annotations:
          summary: "Restore test has not run in 7+ days"
          description: |
            Service {{ $labels.service }} restore test last run: {{ $value | humanizeDuration }} ago
            Weekly restore testing is required to validate DR readiness.
            Action: Schedule restore test run
            Command: guideai dr test-failover
            Runbook: docs/DISASTER_RECOVERY_POLICY.md - Disaster Recovery Testing

      # ======================================================================
      # Backup Size Anomaly Detection
      # ======================================================================

      - alert: BackupSizeAnomaly
        expr: |
          abs(guideai_backup_size_mb - avg_over_time(guideai_backup_size_mb[7d]))
          / avg_over_time(guideai_backup_size_mb[7d]) > 0.5
        for: 10m
        labels:
          severity: warning
          category: anomaly
        annotations:
          summary: "Backup size deviation exceeds 50% from 7-day average"
          description: |
            Service {{ $labels.service }} backup size: {{ $value }}MB
            7-day average: {{ avg_over_time(guideai_backup_size_mb[7d]) }}MB
            Deviation: {{ abs($value - avg_over_time(guideai_backup_size_mb[7d])) }}MB
            This may indicate data corruption, incomplete backup, or unexpected growth.
            Action: Investigate backup integrity and data volume changes
            Command: guideai dr status

      - alert: BackupSizeUnexpectedGrowth
        expr: |
          rate(guideai_backup_size_mb[24h]) > 1000
        for: 1h
        labels:
          severity: warning
          category: capacity
        annotations:
          summary: "Backup size growing rapidly (> 1GB/day)"
          description: |
            Service {{ $labels.service }} backup size growth: {{ $value }}MB/day
            This may indicate data retention issues or uncontrolled data growth.
            Action: Review data lifecycle policies and storage costs
            Action: Validate backup compression is working correctly

# ============================================================================
# Alertmanager Configuration
# ============================================================================
global:
  resolve_timeout: 5m
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

route:
  group_by: ['alertname', 'service', 'category']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'

  routes:
    # Critical alerts go to PagerDuty (page on-call engineer)
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true  # Also send to Slack

    # Warning alerts go to Slack only
    - match:
        severity: warning
      receiver: 'slack-warnings'

    # RTO/RPO violations escalate immediately
    - match:
        category: compliance
      receiver: 'pagerduty-compliance'
      group_wait: 10s
      repeat_interval: 1h

    # Backup failures escalate if not resolved
    - match:
        category: backup
      receiver: 'pagerduty-backup'
      repeat_interval: 2h

receivers:
  - name: 'default-receiver'
    slack_configs:
      - channel: '#guideai-alerts'
        title: 'GuideAI Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          *Description:* {{ .Annotations.description }}
          *Dashboard:* {{ .Annotations.dashboard }}
          {{ end }}

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_CRITICAL_SERVICE_KEY'
        description: '{{ .GroupLabels.alertname }}: {{ .GroupLabels.service }}'
        severity: 'critical'
        details:
          summary: '{{ .Annotations.summary }}'
          description: '{{ .Annotations.description }}'
          runbook: '{{ .Annotations.runbook }}'

  - name: 'pagerduty-compliance'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_COMPLIANCE_SERVICE_KEY'
        description: 'RTO/RPO Violation: {{ .GroupLabels.service }}'
        severity: 'critical'
        details:
          metric: '{{ .Labels.metric }}'
          summary: '{{ .Annotations.summary }}'
          description: '{{ .Annotations.description }}'

  - name: 'pagerduty-backup'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_BACKUP_SERVICE_KEY'
        description: 'Backup Issue: {{ .GroupLabels.service }}'
        severity: 'error'
        details:
          summary: '{{ .Annotations.summary }}'
          description: '{{ .Annotations.description }}'

  - name: 'slack-warnings'
    slack_configs:
      - channel: '#guideai-dr-warnings'
        color: 'warning'
        title: '⚠️ DR Warning: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Service:* {{ .Labels.service }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Action:* Check runbook and investigate
          {{ end }}

inhibit_rules:
  # Suppress backup stale alerts if backup is currently failing
  - source_match:
      alertname: 'BackupFailureRate'
    target_match:
      category: 'backup'
    equal: ['service']

  # Suppress RTO alerts if service is down
  - source_match:
      category: 'health'
    target_match:
      category: 'compliance'
      metric: 'rto'
    equal: ['service']

# ============================================================================
# Metric Exposition
# ============================================================================
# The following metrics should be exposed by the DR scripts and services:
#
# guideai_backup_last_success_timestamp{service="postgres|redis|duckdb",tier="tier1|tier2|tier3|tier4"}
#   - Unix timestamp of last successful backup
#   - Updated by backup scripts after successful S3 upload
#
# guideai_backup_failures_total{service="postgres|redis|duckdb"}
#   - Counter of backup failures
#   - Incremented on script exit code != 0
#
# guideai_restore_time_seconds{service="postgres|redis|duckdb",tier="tier1|tier2|tier3|tier4"}
#   - Histogram of restore operation duration
#   - Measured by restore test suite
#
# guideai_postgres_health_check{tier="tier1"}
#   - Gauge: 1 = healthy, 0 = unhealthy
#   - Updated by test-failover script
#
# guideai_redis_health_check{tier="tier1"}
#   - Gauge: 1 = healthy, 0 = unhealthy
#   - Updated by test-failover script
#
# guideai_postgres_query_latency_seconds{tier="tier1"}
#   - Gauge: query execution time in seconds
#   - Measured by test-failover script
#
# guideai_redis_read_latency_seconds{tier="tier1"}
# guideai_redis_write_latency_seconds{tier="tier1"}
#   - Gauge: operation latency in seconds
#   - Measured by test-failover script
#
# guideai_postgres_replication_lag_seconds
#   - Gauge: replication lag from primary to standby
#   - Queried from PostgreSQL pg_stat_replication
#
# guideai_restore_test_success{service="postgres|redis|duckdb"}
#   - Gauge: 1 = passed, 0 = failed
#   - Updated by test-failover script
#
# guideai_restore_test_last_run_timestamp{service="postgres|redis|duckdb"}
#   - Unix timestamp of last restore test execution
#   - Updated by test-failover script
#
# guideai_backup_size_mb{service="postgres|redis|duckdb"}
#   - Gauge: backup file size in megabytes
#   - Updated by backup scripts from metadata.json
#
# ============================================================================
# Integration with DR Scripts
# ============================================================================
# To integrate these metrics, update the DR scripts to push metrics to
# Prometheus Pushgateway after each operation:
#
# Example (from dr_backup_postgres.sh):
#   METRICS_FILE="/tmp/guideai_dr_metrics.txt"
#   echo "guideai_backup_last_success_timestamp{service=\"postgres\",tier=\"tier1\"} $(date +%s)" > "$METRICS_FILE"
#   echo "guideai_backup_size_mb{service=\"postgres\"} $SIZE_MB" >> "$METRICS_FILE"
#   curl -X POST --data-binary @"$METRICS_FILE" http://pushgateway:9091/metrics/job/guideai_dr
#
# Alternatively, expose metrics via a metrics exporter service that reads
# backup metadata from S3 or local storage.
#
# ============================================================================
# Deployment Instructions
# ============================================================================
# 1. Install Prometheus and Alertmanager:
#    helm install prometheus prometheus-community/kube-prometheus-stack
#
# 2. Configure PagerDuty integration:
#    - Create service keys in PagerDuty console
#    - Update service_key fields in receivers above
#
# 3. Configure Slack integration:
#    - Create incoming webhook in Slack
#    - Update slack_api_url in global config
#
# 4. Deploy this configuration:
#    kubectl apply -f deployment/config/dr_monitoring.yml
#
# 5. Validate alerts fire correctly:
#    guideai dr test-failover
#    Check Alertmanager UI for active alerts
#
# 6. Test PagerDuty and Slack routing:
#    - Manually trigger alert via amtool or Prometheus UI
#    - Verify notifications arrive in correct channels
#
# Reference: docs/DISASTER_RECOVERY_POLICY.md - Section 6: Monitoring and Alerting
