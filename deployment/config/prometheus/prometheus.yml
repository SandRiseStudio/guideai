# Prometheus configuration for GuideAI horizontal scaling
# Monitors all services, databases, and infrastructure components
# Date: 2025-11-08

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'guideai-scaling'
    environment: 'production'

# Alert rules
rule_files:
  - "rules/*.yml"
  - "../prometheus/embedding_alerts.yml"  # Embedding optimization SLO alerts (Task 8.10.1)

# Scrape configurations
scrape_configs:
  # ===================================================================
  # Prometheus Self-Monitoring
  # ===================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 5s
    metrics_path: /metrics

  # ===================================================================
  # GuideAI Core Services
  # ===================================================================
  - job_name: 'guideai-behavior-service'
    static_configs:
      - targets: ['behavior-service:8001']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
   honor_labels: true
    params:
      format: ['prometheus']

  - job_name: 'guideai-action-service'
    static_configs:
      - targets: ['action-service:8002']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true

  - job_name: 'guideai-run-service'
    static_configs:
      - targets: ['run-service:8003']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true

  - job_name: 'guideai-compliance-service'
    static_configs:
      - targets: ['compliance-service:8004']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true

  - job_name: 'guideai-orchestrator-service'
    static_configs:
      - targets: ['agent-orchestrator:8005']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true

  # ===================================================================
  # API Gateway Monitoring
  # ===================================================================
  - job_name: 'guideai-api-gateway'
    static_configs:
      - targets: ['api-gateway:80']
    metrics_path: /nginx_status
    scrape_interval: 30s
    scrape_timeout: 5s
    params:
      format: ['prometheus']

  # ===================================================================
  # Database Monitoring
  # ===================================================================
  - job_name: 'postgres-telemetry'
    static_configs:
      - targets: ['postgres-telemetry:5432']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'postgres-telemetry-exporter:9187'

  - job_name: 'postgres-behavior'
    static_configs:
      - targets: ['postgres-behavior:5432']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'postgres-behavior-exporter:9187'

  - job_name: 'postgres-action'
    static_configs:
      - targets: ['postgres-action:5432']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'postgres-action-exporter:9187'

  - job_name: 'postgres-run'
    static_configs:
      - targets: ['postgres-run:5432']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'postgres-run-exporter:9187'

  - job_name: 'postgres-compliance'
    static_configs:
      - targets: ['postgres-compliance:5432']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'postgres-compliance-exporter:9187'

  - job_name: 'postgres-orchestrator'
    static_configs:
      - targets: ['postgres-orchestrator:5432']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'postgres-orchestrator-exporter:9187'

  # ===================================================================
  # Cache Monitoring
  # ===================================================================
  - job_name: 'redis-master'
    static_configs:
      - targets: ['redis-master:6379']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'redis-exporter:9121'

  - job_name: 'redis-replica'
    static_configs:
      - targets: ['redis-replica-1:6379']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'redis-replica-exporter:9121'

  # ===================================================================
  # Messaging Layer Monitoring
  # ===================================================================
  - job_name: 'kafka-1'
    static_configs:
      - targets: ['kafka-1:9092']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'kafka-exporter:9308'

  - job_name: 'zookeeper'
    static_configs:
      - targets: ['zookeeper:2181']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'zookeeper-exporter:9141'

  # ===================================================================
  # Infrastructure Monitoring
  # ===================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
    scrape_timeout: 15s

  # ===================================================================
  # Container Monitoring
  # ===================================================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s

  # ===================================================================
  # Blackbox Monitoring (Endpoint Health)
  # ===================================================================
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://api-gateway:80/health
        - http://behavior-service:8001/health
        - http://action-service:8002/health
        - http://run-service:8003/health
        - http://compliance-service:8004/health
        - http://agent-orchestrator:8005/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'blackbox-exporter:9115'

  # ===================================================================
  # Custom Metrics for Scaling
  # ===================================================================
  - job_name: 'guideai-scaling-metrics'
    static_configs:
      - targets: ['behavior-service:8001']
    metrics_path: /api/v1/metrics/scaling
    scrape_interval: 30s
    scrape_timeout: 15s
    honor_labels: true
    params:
      format: ['prometheus']

# Storage configuration
storage:
  tsdb:
    retention.time: 15d
    retention.size: 10GB

# Remote write for long-term storage (optional)
# remote_write:
#   - url: "http://remote-storage:8086/api/v1/prom/write?db=prometheus"
#     write_relabel_configs:
#       - source_labels: [__name__]
#         regex: '.*'
#         target_label: database
#         replacement: 'guideai-scaling'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
