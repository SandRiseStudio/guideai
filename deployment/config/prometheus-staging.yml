# Prometheus configuration for GuideAI Staging Environment
# Simplified configuration with staging-specific service endpoints
# Date: 2025-12-02

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'guideai-staging'
    environment: 'staging'

# Alert rules (optional for staging)
rule_files: []
  # Uncomment to enable alerting in staging:
  # - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # ===================================================================
  # Prometheus Self-Monitoring
  # ===================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 5s
    metrics_path: /metrics

  # ===================================================================
  # GuideAI Core Services (Staging)
  # ===================================================================
  - job_name: 'guideai-api-staging'
    static_configs:
      - targets: ['guideai-api:8000']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true

  - job_name: 'guideai-mcp-staging'
    static_configs:
      - targets: ['guideai-mcp:9000']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true

  # ===================================================================
  # PostgreSQL Databases (Staging Ports 6432-6438)
  # ===================================================================
  # Note: These require postgres_exporter sidecar containers for full metrics
  # Currently monitoring via application-level metrics from guideai-api

  - job_name: 'postgres-telemetry-staging'
    static_configs:
      - targets: ['postgres-telemetry:5432']
        labels:
          db_name: 'guideai_telemetry'
          db_type: 'timescaledb'
          staging_port: '6432'
    scrape_interval: 30s
    metrics_path: /probe
    params:
      module: [tcp_connect]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'prometheus-staging:9090'

  # ===================================================================
  # Redis Cache (Staging Port 6380)
  # ===================================================================
  - job_name: 'redis-staging'
    static_configs:
      - targets: ['redis:6379']
        labels:
          cache_type: 'redis'
          staging_port: '6380'
    scrape_interval: 30s

  # ===================================================================
  # Kafka Streaming (when with-streaming profile enabled)
  # ===================================================================
  - job_name: 'kafka-staging'
    static_configs:
      - targets: ['kafka-staging:29092']
        labels:
          service: 'kafka'
          environment: 'staging'
    scrape_interval: 30s
    scrape_timeout: 15s
    honor_labels: true

  - job_name: 'zookeeper-staging'
    static_configs:
      - targets: ['zookeeper-staging:2181']
        labels:
          service: 'zookeeper'
          environment: 'staging'
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'schema-registry-staging'
    static_configs:
      - targets: ['schema-registry-staging:8081']
        labels:
          service: 'schema-registry'
          environment: 'staging'
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # ===================================================================
  # Blackbox HTTP Endpoint Health Checks
  # ===================================================================
  - job_name: 'guideai-health-staging'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://guideai-api:8000/health
        - http://guideai-mcp:9000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'prometheus-staging:9090'

# Storage configuration (reduced retention for staging)
storage:
  tsdb:
    retention.time: 7d
    retention.size: 5GB

# Remote write disabled in staging
# remote_write: []

# Alerting disabled by default in staging
