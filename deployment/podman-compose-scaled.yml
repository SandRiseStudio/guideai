# GuideAI Production-Ready Podman Compose Configuration
# Supports horizontal scaling with resource limits and health checks
# Date: 2025-11-08
# Implements horizontal scaling architecture from HORIZONTAL_SCALING_IMPLEMENTATION.md

version: '3.8'

networks:
  guideai-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
  guideai-database:
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/16
  guideai-cache:
    driver: bridge
    ipam:
      config:
        - subnet: 172.27.0.0/16

volumes:
  postgres-telemetry-data:
    driver: local
  postgres-behavior-data:
    driver: local
  postgres-action-data:
    driver: local
  postgres-run-data:
    driver: local
  postgres-compliance-data:
    driver: local
  postgres-orchestrator-data:
    driver: local
  redis-data:
    driver: local
  redis-data-replica-1:
    driver: local
  kafka-data:
    driver: local
  nginx-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

services:
  # ===================================================================
  # API Gateway - Load Balancer and Rate Limiting
  # ===================================================================
  api-gateway:
    image: nginx:alpine
    container_name: guideai-api-gateway
    networks:
      - guideai-internal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/config/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./deployment/scripts/nginx-entrypoint.sh:/etc/nginx/start-guideai.sh:ro
      - ./deployment/config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deployment/config/ssl:/etc/nginx/ssl:ro
      - nginx-data:/var/cache/nginx
    environment:
      - NGINX_HOST=guideai.local
      - NGINX_PORT=80
      - NGINX_TEMPLATE_VARS=
    command: ["/bin/sh", "/etc/nginx/start-guideai.sh"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ===================================================================
  # Behavior Service - Multi-Replica Scaling
  # ===================================================================
  behavior-service:
    image: localhost/guideai-behavior:latest
    container_name: guideai-behavior-service
    networks:
      - guideai-internal
    environment:
      - DATABASE_URL=postgresql://guideai_user:local_dev_pw@postgres-behavior:5432/behaviors
      - REDIS_URL=redis://redis:6379/0
      - BEHAVIOR_SERVICE_PORT=8001
    volumes:
      - ./data/behaviors:/app/data
    depends_on:
      postgres-behavior:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    scale: 3  # Default replica count
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ===================================================================
  # Action Service - Scalable Action Processing
  # ===================================================================
  action-service:
    image: localhost/guideai-action:latest
    container_name: guideai-action-service
    networks:
      - guideai-internal
    environment:
      - DATABASE_URL=postgresql://guideai_user:local_dev_pw@postgres-action:5432/guideai_action
      - REDIS_URL=redis://redis:6379/1
      - ACTION_SERVICE_PORT=8002
    volumes:
      - ./data/actions:/app/data
    depends_on:
      postgres-action:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    scale: 2  # Default replica count
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ===================================================================
  # Run Service - Orchestration and State Management
  # ===================================================================
  run-service:
    image: localhost/guideai-run:latest
    container_name: guideai-run-service
    networks:
      - guideai-internal
    environment:
      - DATABASE_URL=postgresql://guideai_user:local_dev_pw@postgres-run:5432/guideai_run
      - REDIS_URL=redis://redis:6379/2
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092
      - RUN_SERVICE_PORT=8003
    volumes:
      - ./data/runs:/app/data
    depends_on:
      postgres-run:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    scale: 3  # Default replica count
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ===================================================================
  # Compliance Service - Audit and Governance
  # ===================================================================
  compliance-service:
    image: localhost/guideai-compliance:latest
    container_name: guideai-compliance-service
    networks:
      - guideai-internal
    environment:
      - DATABASE_URL=postgresql://guideai_user:local_dev_pw@postgres-compliance:5432/guideai_compliance
      - REDIS_URL=redis://redis:6379/3
      - COMPLIANCE_SERVICE_PORT=8004
    volumes:
      - ./data/compliance:/app/data
      - ./data/audit-logs:/app/audit-logs
    depends_on:
      postgres-compliance:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    scale: 1  # Default replica count (high availability, not high load)
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ===================================================================
  # Agent Orchestrator Service - Multi-Agent Coordination
  # ===================================================================
  agent-orchestrator:
    image: localhost/guideai-agent-orchestrator:latest
    container_name: guideai-agent-orchestrator
    networks:
      - guideai-internal
    environment:
      - DATABASE_URL=postgresql://guideai_user:local_dev_pw@postgres-orchestrator:5432/guideai_agent_orchestrator
      - REDIS_URL=redis://redis:6379/4
      - ORCHESTRATOR_PORT=8005
    volumes:
      - ./data/orchestrator:/app/data
    depends_on:
      postgres-orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    scale: 2  # Default replica count
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ===================================================================
  # Database Layer - PostgreSQL Cluster
  # ===================================================================

  postgres-telemetry:
    image: timescale/timescaledb:latest-pg16
    container_name: guideai-postgres-telemetry
    networks:
      - guideai-database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=telemetry
      - POSTGRES_USER=guideai_telemetry
      - POSTGRES_PASSWORD=dev_telemetry_pass
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    command:
      - postgres
      - -c
      - log_min_duration_statement=1000
      - -c
      - shared_preload_libraries=timescaledb
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
    volumes:
      - postgres-telemetry-data:/var/lib/postgresql/data
      - ./schema/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_telemetry -d telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  postgres-telemetry-replica-1:
    image: timescale/timescaledb:latest-pg16
    container_name: guideai-postgres-telemetry-replica-1
    networks:
      - guideai-database
    environment:
      - POSTGRES_DB=telemetry
      - POSTGRES_USER=guideai_telemetry
      - POSTGRES_PASSWORD=dev_telemetry_pass
      - POSTGRES_MASTER_SERVICE=postgres-telemetry
      - POSTGRES_REPLICA_MODE=slave
    command:
      - postgres
      - -c
      - hot_standby=on
      - -c
      - max_connections=150
      - -c
      - shared_buffers=256MB
    volumes:
      - postgres-telemetry-data-replica-1:/var/lib/postgresql/data
    depends_on:
      postgres-telemetry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_telemetry -d telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Additional database instances for other services
  postgres-behavior:
    image: pgvector/pgvector:pg16
    container_name: guideai-postgres-behavior
    networks:
      - guideai-database
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=behaviors
      - POSTGRES_USER=guideai_user
      - POSTGRES_PASSWORD=local_dev_pw
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    command:
      - postgres
      - -c
      - log_min_duration_statement=1000
      - -c
      - max_connections=100
    volumes:
      - postgres-behavior-data:/var/lib/postgresql/data
      - ./schema/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_user -d behaviors"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  postgres-action:
    image: postgres:16-alpine
    container_name: guideai-postgres-action
    networks:
      - guideai-database
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=guideai_action
      - POSTGRES_USER=guideai_user
      - POSTGRES_PASSWORD=local_dev_pw
    command:
      - postgres
      - -c
      - log_min_duration_statement=1000
      - -c
      - max_connections=100
    volumes:
      - postgres-action-data:/var/lib/postgresql/data
      - ./schema/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_user -d guideai_action"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  postgres-run:
    image: postgres:16-alpine
    container_name: guideai-postgres-run
    networks:
      - guideai-database
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=guideai_run
      - POSTGRES_USER=guideai_user
      - POSTGRES_PASSWORD=local_dev_pw
    command:
      - postgres
      - -c
      - log_min_duration_statement=1000
      - -c
      - max_connections=100
    volumes:
      - postgres-run-data:/var/lib/postgresql/data
      - ./schema/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_user -d guideai_run"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  postgres-compliance:
    image: postgres:16-alpine
    container_name: guideai-postgres-compliance
    networks:
      - guideai-database
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_DB=guideai_compliance
      - POSTGRES_USER=guideai_user
      - POSTGRES_PASSWORD=local_dev_pw
    command:
      - postgres
      - -c
      - log_min_duration_statement=1000
      - -c
      - max_connections=100
    volumes:
      - postgres-compliance-data:/var/lib/postgresql/data
      - ./schema/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_user -d guideai_compliance"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  postgres-orchestrator:
    image: postgres:16-alpine
    container_name: guideai-postgres-orchestrator
    networks:
      - guideai-database
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_DB=guideai_agent_orchestrator
      - POSTGRES_USER=guideai_user
      - POSTGRES_PASSWORD=local_dev_pw
    command:
      - postgres
      - -c
      - log_min_duration_statement=1000
      - -c
      - max_connections=100
    volumes:
      - postgres-orchestrator-data:/var/lib/postgresql/data
      - ./schema/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_user -d guideai_agent_orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ===================================================================
  # Cache Layer - Redis for High Availability
  # ===================================================================

  redis-master:
    image: redis:7-alpine
    container_name: guideai-redis-master
    networks:
      - guideai-cache
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --maxmemory
      - "1gb"
      - --maxmemory-policy
      - "allkeys-lru"
      - --save
      - "60 1"
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  redis-replica-1:
    image: redis:7-alpine
    container_name: guideai-redis-replica-1
    networks:
      - guideai-cache
    environment:
      - REDIS_MASTER=redis-master
    command:
      - redis-server
      - --replicaof
      - redis-master
      - 6379
      - --maxmemory
      - "1gb"
      - --maxmemory-policy
      - "allkeys-lru"
    volumes:
      - redis-data-replica-1:/data
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ===================================================================
  # Messaging Layer - Kafka for Event Streaming
  # ===================================================================

  kafka-1:
    image: confluentinc/cp-kafka:latest
    container_name: guideai-kafka-1
    networks:
      - guideai-internal
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: guideai-zookeeper
    networks:
      - guideai-internal
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ===================================================================
  # Monitoring and Observability
  # ===================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: guideai-prometheus
    networks:
      - guideai-internal
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployment/config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  grafana:
    image: grafana/grafana:latest
    container_name: guideai-grafana
    networks:
      - guideai-internal
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployment/config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deployment/config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
