# =============================================================================
# GuideAI Gateway - nginx.conf
# =============================================================================
# Phase 0 Implementation (AGENT_EXECUTION_ARCHITECTURE.md)
#
# Edge gateway providing:
#   - Rate limiting per tenant (100r/s API, 10r/s WebSocket)
#   - WebSocket upgrade support for real-time collaboration
#   - Health check passthrough (no rate limiting)
#   - SSE streaming support
#   - TLS termination (production)
#
# Port: 8080 (gateway) -> 8000 (guideai-api)
#
# NOTE: Uses dynamic DNS resolution via resolver directive to allow nginx
# to start before the API container is fully available. This is essential
# for container orchestration where service startup order isn't guaranteed.
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;

    # -------------------------------------------------------------------------
    # Dynamic DNS Resolution
    # -------------------------------------------------------------------------
    # Container DNS resolution for service discovery.
    # - Docker uses 127.0.0.11 (embedded DNS)
    # - Podman uses network gateway IP (typically 10.89.0.1 for aardvark-dns)
    # Using ${NGINX_RESOLVER} with envsubst, falling back to Podman default.
    # valid=5s means DNS results are cached for 5 seconds (helps with startup).
    resolver ${NGINX_RESOLVER} valid=5s ipv6=off;
    resolver_timeout 10s;

    # -------------------------------------------------------------------------
    # Rate Limiting Zones (per tenant)
    # -------------------------------------------------------------------------
    # API: 100 requests/second per tenant
    limit_req_zone $http_x_tenant_id zone=tenant_api:10m rate=100r/s;

    # WebSocket/SSE: 10 connections/second per tenant
    limit_req_zone $http_x_tenant_id zone=tenant_ws:10m rate=10r/s;

    # Fallback for anonymous requests (by IP)
    limit_req_zone $binary_remote_addr zone=anonymous:10m rate=10r/s;

    # Connection limits per tenant
    limit_conn_zone $http_x_tenant_id zone=tenant_conn:10m;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format guideai_json escape=json '{'
        '"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"method": "$request_method",'
        '"uri": "$request_uri",'
        '"status": $status,'
        '"bytes": $body_bytes_sent,'
        '"request_time": $request_time,'
        '"upstream_time": "$upstream_response_time",'
        '"tenant_id": "$http_x_tenant_id",'
        '"user_id": "$http_x_user_id",'
        '"user_agent": "$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log guideai_json;

    # -------------------------------------------------------------------------
    # Server Block
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Define upstream as a variable for dynamic DNS resolution
        # This is resolved at request time, not at nginx startup
        set $upstream_api guideai-api:8000;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ---------------------------------------------------------------------
        # Health/Ready - No rate limiting
        # ---------------------------------------------------------------------
        location /health {
            access_log off;
            proxy_pass http://$upstream_api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location /ready {
            access_log off;
            proxy_pass http://$upstream_api/ready;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location /metrics {
            proxy_pass http://$upstream_api/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---------------------------------------------------------------------
        # API Endpoints - Rate limited
        # ---------------------------------------------------------------------
        location /api/ {
            limit_req zone=tenant_api burst=200 nodelay;
            limit_req zone=anonymous burst=20 nodelay;
            limit_req_status 429;
            limit_conn tenant_conn 100;
            limit_conn_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_set_header X-User-Plan $http_x_user_plan;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        location /v1/ {
            limit_req zone=tenant_api burst=200 nodelay;
            limit_req zone=anonymous burst=20 nodelay;
            limit_req_status 429;
            limit_conn tenant_conn 100;
            limit_conn_status 429;

            proxy_pass http://$upstream_api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_set_header X-User-Plan $http_x_user_plan;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # ---------------------------------------------------------------------
        # WebSocket Endpoints
        # ---------------------------------------------------------------------
        location /ws/ {
            limit_req zone=tenant_ws burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_set_header X-User-Id $http_x_user_id;

            # 1 hour timeout for persistent connections
            proxy_connect_timeout 30s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        # ---------------------------------------------------------------------
        # Server-Sent Events (SSE)
        # ---------------------------------------------------------------------
        location /sse/ {
            limit_req zone=tenant_ws burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Cache-Control no-cache;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_set_header X-User-Id $http_x_user_id;

            proxy_read_timeout 3600s;
            proxy_buffering off;
            chunked_transfer_encoding off;
        }

        # ---------------------------------------------------------------------
        # MCP Protocol
        # ---------------------------------------------------------------------
        location /mcp/ {
            limit_req zone=tenant_api burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_set_header X-User-Id $http_x_user_id;

            proxy_read_timeout 300s;
        }

        # ---------------------------------------------------------------------
        # Default fallback
        # ---------------------------------------------------------------------
        location / {
            # Pass through to API for any other routes
            limit_req zone=tenant_api burst=100 nodelay;
            limit_req zone=anonymous burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_set_header X-User-Id $http_x_user_id;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
