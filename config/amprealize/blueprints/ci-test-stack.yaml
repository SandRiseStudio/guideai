name: ci-test-stack
version: 1.0.0
services:
  postgres-behavior-test:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "6433:5432"
    environment:
      POSTGRES_USER: guideai_behavior
      POSTGRES_PASSWORD: behavior_test_pass
      POSTGRES_DB: guideai_behavior
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-behavior-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_behavior"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres-workflow-test:
    image: postgres:16-alpine
    ports:
      - "6434:5432"
    environment:
      POSTGRES_USER: guideai_workflow
      POSTGRES_PASSWORD: workflow_test_pass
      POSTGRES_DB: guideai_workflow
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-workflow-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_workflow"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres-action-test:
    image: postgres:16-alpine
    ports:
      - "6435:5432"
    environment:
      POSTGRES_USER: guideai_action
      POSTGRES_PASSWORD: action_test_pass
      POSTGRES_DB: guideai_action
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-action-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_action"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres-run-test:
    image: postgres:16-alpine
    ports:
      - "6436:5432"
    environment:
      POSTGRES_USER: guideai_run
      POSTGRES_PASSWORD: run_test_pass
      POSTGRES_DB: guideai_run
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-run-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_run"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres-compliance-test:
    image: postgres:16-alpine
    ports:
      - "6437:5432"
    environment:
      POSTGRES_USER: guideai_compliance
      POSTGRES_PASSWORD: compliance_test_pass
      POSTGRES_DB: guideai_compliance
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-compliance-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_compliance"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres-telemetry-test:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "6432:5432"
    environment:
      POSTGRES_USER: guideai_telemetry
      POSTGRES_PASSWORD: telemetry_test_pass
      POSTGRES_DB: guideai_telemetry
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-telemetry-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres-metrics-test:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "6439:5432"
    environment:
      POSTGRES_USER: guideai_metrics_user
      POSTGRES_PASSWORD: local_metrics_dev_pw
      POSTGRES_DB: guideai_metrics
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-metrics-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_metrics_user"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres-auth-test:
    image: postgres:16-alpine
    ports:
      - "6440:5432"
    environment:
      POSTGRES_USER: guideai_auth
      POSTGRES_PASSWORD: auth_test_pass
      POSTGRES_DB: guideai_auth
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-auth-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideai_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis-test:
    image: redis:7-alpine
    ports:
      - "6479:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-test-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  zookeeper-test:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "3181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    volumes:
      - zookeeper-test-data:/var/lib/zookeeper/data
      - zookeeper-test-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
  kafka-test:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper-test:
        condition: service_started
    ports:
      - "10092:10092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper-test:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:10092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-test:9092,PLAINTEXT_HOST://localhost:10092"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx256M"
    volumes:
      - kafka-test-data:/var/lib/kafka/data
    command:
      - bash
      - -c
      - |
          echo 'Waiting for stale /brokers/ids/1 entries to clear before starting Kafka...';
          for attempt in $(seq 1 20); do
            if zookeeper-shell zookeeper-test:2181 stat /brokers/ids/1 >/dev/null 2>&1; then
              echo "entry still present (attempt $${attempt}/20); sleeping 2s";
              sleep 2;
            else
              echo 'broker slot is free';
              break;
            fi;
          done;
          if zookeeper-shell zookeeper-test:2181 stat /brokers/ids/1 >/dev/null 2>&1; then
            echo 'forcing delete of stale broker registration';
            zookeeper-shell zookeeper-test:2181 delete /brokers/ids/1 >/dev/null 2>&1 || true;
          fi;
          exec /etc/confluent/docker/run
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
  # NGINX reverse proxy for testing API routing
  # Proxies to host machine where test runner starts the API server
  nginx-test:
    image: nginx:alpine
    ports:
      - "8080:80"
    environment:
      GUIDEAI_STAGING_UPSTREAM_HOST: host.containers.internal
      GUIDEAI_STAGING_UPSTREAM_PORT: "8000"
      NGINX_TEMPLATE_VARS: "GUIDEAI_STAGING_UPSTREAM_HOST GUIDEAI_STAGING_UPSTREAM_PORT"
    volumes:
      - "${GUIDEAI_REPO_ROOT:-/Users/nick/guideai}/deployment/config/nginx-staging.conf:/etc/nginx/nginx.conf.template:ro"
      - "${GUIDEAI_REPO_ROOT:-/Users/nick/guideai}/deployment/scripts/nginx-entrypoint.sh:/etc/nginx/start-guideai.sh:ro"
    command: ["/bin/sh", "/etc/nginx/start-guideai.sh"]
    extra_hosts:
      - "host.containers.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
volumes:
  postgres-behavior-test-data:
  postgres-workflow-test-data:
  postgres-action-test-data:
  postgres-run-test-data:
  postgres-compliance-test-data:
  postgres-telemetry-test-data:
  postgres-metrics-test-data:
  postgres-auth-test-data:
  redis-test-data:
  zookeeper-test-data:
  zookeeper-test-log:
  kafka-test-data:
