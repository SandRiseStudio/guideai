services:
  # Metabase - Analytics dashboard and visualization platform
  # Now configured for TimescaleDB telemetry warehouse (migration 014)
  metabase:
    image: metabase/metabase:v0.48.0
    container_name: guideai-metabase
    ports:
      - "3000:3000"
    environment:
      # Application database (H2 embedded for simplicity, use Postgres for production)
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db

      # Admin account setup (first-time only)
      # NOTE: Always set MB_ADMIN_PASSWORD in production - see .env.example
      MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL:-admin@guideai.local}
      MB_ADMIN_FIRST_NAME: ${MB_ADMIN_FIRST_NAME:-GuideAI}
      MB_ADMIN_LAST_NAME: ${MB_ADMIN_LAST_NAME:-Admin}
      MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD:?MB_ADMIN_PASSWORD must be set in .env}

      # Site settings
      MB_SITE_NAME: "GuideAI Analytics - TimescaleDB"
      MB_SITE_URL: ${MB_SITE_URL:-http://localhost:3000}

      # Performance tuning
      JAVA_OPTS: "-Xmx1g -Xms512m"

      # Timezone
      MB_TIMEZONE: ${MB_TIMEZONE:-America/Los_Angeles}

      # Anonymous telemetry (disable for internal deployments)
      MB_SEND_EMAIL_ON_FIRST_LOGIN_FROM_NEW_DEVICE: false
      MB_ANON_TRACKING_ENABLED: false

    volumes:
      # Persistent storage for Metabase application database
      - metabase-data:/metabase-data

      # Dashboard exports (optional, for backup/restore)
      - ./docs/analytics/dashboard-exports:/dashboard-exports:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    restart: unless-stopped

    networks:
      - guideai-analytics
      - guideai_guideai-postgres-net  # Connect to postgres-telemetry via shared network

  # DuckDB Query Service (optional REST wrapper for remote access)
  # Uncomment if you need to query DuckDB from external tools
  # duckdb-api:
  #   image: python:3.11-slim
  #   container_name: guideai-duckdb-api
  #   working_dir: /app
  #   command: >
  #     sh -c "pip install --no-cache-dir 'duckdb>=0.9,<1.0' 'fastapi>=0.104,<1.0' 'uvicorn[standard]>=0.24,<1.0' &&
  #            uvicorn guideai.api:app --host 0.0.0.0 --port 8000"
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./:/app
  #     - ./data:/app/data
  #   environment:
  #     PYTHONPATH: /app
  #   networks:
  #     - guideai-analytics
  #   depends_on:
  #     - metabase

networks:
  guideai-analytics:
    driver: bridge
  guideai_guideai-postgres-net:
    external: true  # Shared with docker-compose.postgres.yml

volumes:
  metabase-data:
    driver: local

# Usage (Podman):
# 1. Ensure Podman machine is running:
#    podman machine start
#
# 2. Ensure postgres-telemetry container is running:
#    podman-compose -f docker-compose.postgres.yml up -d postgres-telemetry
#
# 3. Start Metabase:
#    podman-compose -f docker-compose.analytics-dashboard.yml up -d
#    (Or use Docker Compose compatibility: docker-compose → podman-compose)
#
# 4. Access dashboard:
#    http://localhost:3000
#    Login: admin@guideai.local / changeme123 (or configured values)
#
# 5. Connect to TimescaleDB telemetry warehouse:
#    - Database type: PostgreSQL
#    - Name: GuideAI Telemetry Warehouse
#    - Host: postgres-telemetry (container hostname on guideai-postgres-net)
#    - Port: 5432
#    - Database name: telemetry
#    - Username: guideai_telemetry
#    - Password: dev_telemetry_pass
#
# 6. Query telemetry_events hypertable:
#    SELECT * FROM telemetry_events ORDER BY event_timestamp DESC LIMIT 100;
#
#    Use continuous aggregates for dashboards:
#    - telemetry_hourly (hourly rollups, 10-min refresh)
#    - telemetry_daily (daily rollups, 1-hour refresh)
#    - telemetry_weekly (weekly rollups, 1-day refresh)
#
# 7. Import updated dashboards:
#    Settings > Admin > Data Model > Import
#    Upload JSON files from /dashboard-exports (updated for TimescaleDB schema)
#
# 8. Stop services:
#    podman-compose -f docker-compose.analytics-dashboard.yml down
#
# Production deployment notes:
# - Change MB_DB_TYPE to postgres for production (requires separate Postgres service)
# - Update MB_ADMIN_PASSWORD via environment variable or secrets manager
# - Configure MB_SITE_URL to match your domain
# - Set up reverse proxy (nginx) with TLS termination
# - Enable authentication provider (SAML, LDAP, OAuth) via Metabase Enterprise
# - Configure email settings for alerts and subscriptions
# - Set up backup strategy for metabase-data volume
# - Use TimescaleDB continuous aggregates for high-performance dashboards
# - Configure TimescaleDB compression and retention policies (already set in migration 014)
#
# Podman considerations:
# - Podman machine must be running: `podman machine start`
# - Use podman-compose for Docker Compose compatibility
# - Rootless mode: volumes mount with user permissions (recommended)
# - For production: consider Kubernetes/OpenShift for container orchestration
# - Ensure guideai-postgres-net network exists before starting Metabase:
#   podman network inspect guideai-postgres-net || podman-compose -f docker-compose.postgres.yml up -d
#
# Migration from DuckDB:
# - Data migrated via scripts/migrate_telemetry_duckdb_to_postgres.py (completed 2025-10-30)
# - Dashboard queries updated for TimescaleDB schema (see docs/analytics/dashboard-exports/*)
# - Old DuckDB volume mounts removed; TimescaleDB accessed via network connection
